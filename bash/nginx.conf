# Nginx 配置文件
# 用途: 所有 Docker 组件端口转发到 192.168.3.100

worker_processes  auto;
error_log  logs/error.log info;
pid        logs/nginx.pid;

events {
    worker_connections  4096;
}

# ===== TCP/UDP 代理（所有组件） =====
stream {
    # ---- 数据库 & 缓存 ----
    server { listen 3306;  proxy_pass 192.168.3.100:3306; }   # MySQL
    server { listen 6379;  proxy_pass 192.168.3.100:6379; }   # Redis
    server { listen 27017; proxy_pass 192.168.3.100:27017; }  # MongoDB

    # ---- 搜索引擎 ----
    server { listen 9200;  proxy_pass 192.168.3.100:9200; }   # ES HTTP
    server { listen 9300;  proxy_pass 192.168.3.100:9300; }   # ES Transport

    # ---- 对象存储 ----
    server { listen 9000;  proxy_pass 192.168.3.100:9000; }   # MinIO API
    server { listen 9001;  proxy_pass 192.168.3.100:9001; }   # MinIO Console

    # ---- 注册中心 & 配置 ----
    server { listen 8848;  proxy_pass 192.168.3.100:8848; }   # Nacos HTTP
    server { listen 9848;  proxy_pass 192.168.3.100:9848; }   # Nacos gRPC
    server { listen 9849;  proxy_pass 192.168.3.100:9849; }   # Nacos gRPC-Server

    # ---- 服务发现 ----
    server { listen 8500;  proxy_pass 192.168.3.100:8500; }   # Consul HTTP
    # UDP proxy not supported by nginx stream, skip Consul DNS:8600

    # ---- 分布式协调 ----
    server { listen 2181;  proxy_pass 192.168.3.100:2181; }   # ZooKeeper

    # ---- 消息队列 ----
    server { listen 9092;  proxy_pass 192.168.3.100:9092; }   # Kafka
    server { listen 9097;  proxy_pass 192.168.3.100:9097; }   # Kafka UI
    server { listen 5672;  proxy_pass 192.168.3.100:5672; }   # RabbitMQ AMQP
    server { listen 15672; proxy_pass 192.168.3.100:15672; }  # RabbitMQ Management
    server { listen 9876;  proxy_pass 192.168.3.100:9876; }   # RocketMQ NameServer
    server { listen 10911; proxy_pass 192.168.3.100:10911; }  # RocketMQ Broker

    # ---- CI/CD ----
    server { listen 8080;  proxy_pass 192.168.3.100:8080; }   # Jenkins
    server { listen 5000;  proxy_pass 192.168.3.100:5000; }   # Docker Registry
    server { listen 8085;  proxy_pass 192.168.3.100:8085; }   # Registry UI

    # ---- 向量数据库 ----
    server { listen 19530; proxy_pass 192.168.3.100:19530; }  # Milvus

    # ---- 监控 ----
    server { listen 9090;  proxy_pass 192.168.3.100:9090; }   # Prometheus
    server { listen 3000;  proxy_pass 192.168.3.100:3000; }   # Grafana
    server { listen 9091;  proxy_pass 192.168.3.100:9091; }   # Milvus Metrics

    # ---- Docker API ----
    server { listen 2375;  proxy_pass 192.168.3.100:2375; }   # Docker TCP API
}

# ===== HTTP 服务（默认配置） =====
http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   html;
            index  index.html index.htm;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
