spring:
  application:
    name: spring-interview-qa

  # H2 内存数据库 — 事务 Demo 使用（各包用独立 DB 名避免冲突）
  datasource:
    url: jdbc:h2:mem:main;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  # ===== Q06: Bean 覆盖开关 =====
  # 本项目 24 个 Demo 各定义了同名 dataSource / transactionManager Bean，
  # 它们通过各自的 main() 独立运行，但被全局 @ComponentScan 扫描到时
  # 会冲突。启用覆盖让容器选择最后一个注册的。
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB


server:
  port: 8080
#  jetty:
#    threads:
#      max: 8
#      min: 8
  tomcat:
    threads:
      max: 8

# ===== Q24: 外部化配置优先级 Demo =====
# 加载顺序（从高到低）：
# 1. 命令行参数           --spring.profiles.active=prod
# 2. 环境变量             export SERVER_PORT=9090
# 3. application-{profile}.yml
# 4. application.yml
# 5. @PropertySource 指定的文件

# ===== 自定义配置属性（Q22 自定义 Starter 使用）=====
my-starter:
  enabled: true
  prefix: "QA-"
  timeout: 3000
