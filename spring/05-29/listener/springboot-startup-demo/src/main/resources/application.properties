server.port=8081
# 打印完整启动信息
logging.level.com.example.startupdemo=INFO

# ============================================================
# Banner 配置
# ============================================================
# 默认 banner.txt 位置：classpath:banner.txt
# 自定义路径：
# spring.banner.location=classpath:my-banner.txt

# 图片转 ASCII Banner（支持 gif/jpg/png）：
# spring.banner.image.location=classpath:banner.png

# Banner 输出模式：console / log / off
# spring.main.banner-mode=console

# 如果打开下面的注释，程序式 Banner 就不再展示
# spring.main.banner-mode=off
