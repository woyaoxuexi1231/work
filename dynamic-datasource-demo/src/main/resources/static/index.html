<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动态多数据源管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white shadow-sm border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-gray-800">
        <i class="fa-solid fa-database text-blue-500 mr-2"></i>动态多数据源管理
      </h1>
      <p class="text-sm text-gray-500 mt-0.5">DynamicRoutingDataSource — 运行时增删数据源 · 连接池监控 · 优雅下线</p>
    </div>
    <button onclick="refreshList()"
            class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition text-sm font-medium">
      <i class="fa-solid fa-rotate mr-1"></i>刷新
    </button>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-6">

  <!-- Toolbar -->
  <div class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-2" id="countBadge"></div>
    <button onclick="showAddModal()"
            class="px-5 py-2.5 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition text-sm font-medium shadow-sm">
      <i class="fa-solid fa-plus mr-1"></i>注册数据源
    </button>
  </div>

  <!-- Datasource Cards -->
  <div id="dsList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="col-span-full text-center py-12 text-gray-400">
      <i class="fa-solid fa-spinner fa-spin text-3xl mb-2 block"></i>加载中...
    </div>
  </div>

</main>

<!-- ========== Add Modal ========== -->
<div id="addModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between rounded-t-xl">
      <h2 class="text-lg font-bold text-gray-800">
        <i class="fa-solid fa-plus-circle text-emerald-500 mr-2"></i>注册新数据源
      </h2>
      <button onclick="closeAddModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
    </div>
    <form id="addForm" class="px-6 py-4 space-y-4" onsubmit="handleAdd(event)">
      <!-- 基础连接参数 -->
      <fieldset class="border rounded-lg p-4">
        <legend class="text-sm font-semibold text-gray-600 px-1">连接信息</legend>
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">数据源 Key <span class="text-red-400">*</span></label>
            <input name="key" required placeholder="例如: order_db, report_db"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">JDBC URL <span class="text-red-400">*</span></label>
            <input name="url" required placeholder="jdbc:h2:mem:order_db;DB_CLOSE_DELAY=-1;MODE=MySQL"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">用户名</label>
              <input name="username" placeholder="sa" value="sa"
                     class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">密码</label>
              <input name="password" type="password" placeholder="(留空)" value=""
                     class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Driver</label>
            <input name="driverClassName" value="org.h2.Driver"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none text-gray-500">
          </div>
        </div>
      </fieldset>

      <!-- 连接池参数 -->
      <fieldset class="border rounded-lg p-4">
        <legend class="text-sm font-semibold text-gray-600 px-1">HikariCP 连接池参数</legend>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">最大连接数</label>
            <input name="maxPoolSize" type="number" value="10" min="1" max="100"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">最小空闲连接</label>
            <input name="minIdle" type="number" value="2" min="0" max="50"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">连接超时 (ms)</label>
            <input name="connectionTimeout" type="number" value="30000" min="1000"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">空闲超时 (ms)</label>
            <input name="idleTimeout" type="number" value="600000" min="0"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-medium text-gray-500 mb-1">最大生命周期 (ms)</label>
            <input name="maxLifetime" type="number" value="1800000" min="0"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:border-blue-400 outline-none">
          </div>
        </div>
      </fieldset>

      <div class="flex justify-end gap-3 pt-2 pb-2">
        <button type="button" onclick="closeAddModal()"
                class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">取消</button>
        <button type="submit"
                class="px-6 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition text-sm font-medium">
          <i class="fa-solid fa-check mr-1"></i>注册
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ========== Delete Confirm Modal ========== -->
<div id="deleteModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md">
    <div class="px-6 py-5">
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center flex-shrink-0">
          <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
        </div>
        <div>
          <h3 class="font-bold text-gray-800">确认下线数据源</h3>
          <p class="text-sm text-gray-500 mt-1">
            将从路由表中移除 <strong id="deleteKey" class="text-red-500"></strong>，等待活跃连接排空后关闭连接池。
          </p>
          <p class="text-xs text-gray-400 mt-2">
            <i class="fa-solid fa-circle-info mr-1"></i>新请求将不再路由到此数据源，已有连接会在最长 30 秒内排空。
          </p>
        </div>
      </div>
    </div>
    <div class="border-t px-6 py-4 flex justify-end gap-3">
      <button onclick="closeDeleteModal()"
              class="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">取消</button>
      <button id="confirmDeleteBtn"
              class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition text-sm font-medium">
        <i class="fa-solid fa-power-off mr-1"></i>确认下线
      </button>
    </div>
  </div>
</div>

<!-- ========== Toast ========== -->
<div id="toast" class="fixed top-6 right-6 z-[100] hidden transition-all duration-300"></div>

<script>
// ==================== API 封装 ====================
const API = {
  list: ()   => fetch('/api/datasource').then(r => r.json()),
  get: (key) => fetch('/api/datasource/' + key).then(r => r.json()),
  add: (body) => fetch('/api/datasource', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  }).then(r => r.json()),
  remove: (key) => fetch('/api/datasource/' + key, { method: 'DELETE' }).then(r => r.json())
};

// ==================== Toast ====================
function toast(message, type) {
  const el = document.getElementById('toast');
  const colors = { success: 'bg-emerald-500', error: 'bg-red-500', warn: 'bg-amber-500' };
  el.className = 'fixed top-6 right-6 z-[100] px-5 py-3 rounded-lg text-white text-sm font-medium shadow-lg transition-all duration-300 ' + (colors[type] || colors.success);
  el.textContent = message;
  el.style.opacity = '1';
  el.style.transform = 'translateY(0)';
  el.classList.remove('hidden');
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(-10px)'; }, 2500);
  setTimeout(() => el.classList.add('hidden'), 2800);
}

// ==================== 渲染列表 ====================
async function refreshList() {
  const container = document.getElementById('dsList');
  const countBadge = document.getElementById('countBadge');
  container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-3xl mb-2 block"></i>加载中...</div>';

  let res;
  try {
    res = await API.list();
  } catch (e) {
    container.innerHTML = '<div class="col-span-full text-center py-12 text-red-400">请求失败，请检查后端是否启动</div>';
    return;
  }

  if (res.code !== 0) {
    container.innerHTML = '<div class="col-span-full text-center py-12 text-red-400">' + res.message + '</div>';
    return;
  }

  const list = res.data || [];
  countBadge.innerHTML = '<span class="text-sm text-gray-500">已注册 <span class="font-bold text-gray-700">' + list.length + '</span> 个动态数据源</span>';

  if (list.length === 0) {
    container.innerHTML = `
      <div class="col-span-full text-center py-16 bg-white rounded-xl border-2 border-dashed border-gray-200">
        <i class="fa-solid fa-database text-4xl text-gray-300 mb-3 block"></i>
        <p class="text-gray-400">暂无注册的动态数据源</p>
        <p class="text-sm text-gray-300 mt-1">点击"注册数据源"添加一个</p>
      </div>`;
    return;
  }

  container.innerHTML = list.map(ds => {
    const statusColor = ds.online ? 'text-emerald-500' : 'text-red-400';
    const statusText = ds.online ? '在线' : '已下线';
    const usagePct = ds.maxPoolSize > 0 ? (ds.activeConnections / ds.maxPoolSize * 100) : 0;
    const barColor = usagePct > 80 ? 'bg-red-400' : usagePct > 50 ? 'bg-amber-400' : 'bg-emerald-400';

    return `
    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm hover:shadow-md transition">
      <div class="flex items-start justify-between mb-3">
        <div>
          <div class="flex items-center gap-2">
            <span class="font-bold text-gray-800 text-base">${esc(ds.key)}</span>
            <span class="text-xs px-2 py-0.5 rounded-full ${ds.online ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-500'} font-medium">
              <i class="fa-solid fa-circle text-[6px] ${statusColor} mr-1"></i>${statusText}
            </span>
          </div>
          <p class="text-xs text-gray-400 mt-0.5 font-mono truncate max-w-[280px]" title="${esc(ds.url)}">${esc(ds.url)}</p>
        </div>
        <button onclick="showDeleteModal('${esc(ds.key)}')"
                class="text-gray-300 hover:text-red-500 transition p-1" title="下线此数据源">
          <i class="fa-solid fa-power-off"></i>
        </button>
      </div>

      <!-- 连接池指标 -->
      <div class="space-y-2">
        <div class="flex justify-between text-xs text-gray-500">
          <span>连接池使用</span>
          <span>${ds.activeConnections} / ${ds.maxPoolSize}</span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
          <div class="h-full ${barColor} rounded-full transition-all duration-500"
               style="width:${Math.min(usagePct, 100)}%"></div>
        </div>
        <div class="grid grid-cols-3 gap-2 text-xs text-gray-500 mt-2">
          <div class="text-center bg-gray-50 rounded-lg py-1.5">
            <div class="font-bold text-gray-700">${ds.activeConnections}</div>
            <div>活跃</div>
          </div>
          <div class="text-center bg-gray-50 rounded-lg py-1.5">
            <div class="font-bold text-gray-700">${ds.idleConnections}</div>
            <div>空闲</div>
          </div>
          <div class="text-center bg-gray-50 rounded-lg py-1.5">
            <div class="font-bold text-gray-700">${ds.totalConnections}</div>
            <div>总数</div>
          </div>
        </div>
        <div class="text-xs text-gray-400 flex justify-between pt-1">
          <span>Pool: ${esc(ds.poolName)}</span>
          <span>MinIdle: ${ds.minIdle}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ==================== Add Modal ====================
function showAddModal() {
  document.getElementById('addModal').classList.remove('hidden');
  document.getElementById('addModal').classList.add('flex');
  document.getElementById('addForm').reset();
}
function closeAddModal() {
  document.getElementById('addModal').classList.add('hidden');
  document.getElementById('addModal').classList.remove('flex');
}
async function handleAdd(e) {
  e.preventDefault();
  const form = e.target;
  const body = {
    key: form.key.value.trim(),
    url: form.url.value.trim(),
    username: form.username.value.trim(),
    password: form.password.value,
    driverClassName: form.driverClassName.value.trim(),
    maxPoolSize: parseInt(form.maxPoolSize.value) || 10,
    minIdle: parseInt(form.minIdle.value) || 2,
    connectionTimeout: parseInt(form.connectionTimeout.value) || 30000,
    idleTimeout: parseInt(form.idleTimeout.value) || 600000,
    maxLifetime: parseInt(form.maxLifetime.value) || 1800000
  };

  const submitBtn = form.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>注册中...';

  let res;
  try { res = await API.add(body); }
  catch (err) { toast('网络错误', 'error'); submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>注册'; return; }

  submitBtn.disabled = false;
  submitBtn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>注册';

  if (res.code === 0) {
    toast('数据源 ' + body.key + ' 注册成功', 'success');
    closeAddModal();
    refreshList();
  } else {
    toast(res.message, 'error');
  }
}

// ==================== Delete Modal ====================
let pendingDeleteKey = null;
function showDeleteModal(key) {
  pendingDeleteKey = key;
  document.getElementById('deleteKey').textContent = key;
  document.getElementById('deleteModal').classList.remove('hidden');
  document.getElementById('deleteModal').classList.add('flex');

  const btn = document.getElementById('confirmDeleteBtn');
  btn.onclick = async function() {
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>下线中...';

    let res;
    try { res = await API.remove(pendingDeleteKey); }
    catch (err) { toast('网络错误', 'error'); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-power-off mr-1"></i>确认下线'; return; }

    if (res.code === 0) {
      toast('数据源 ' + pendingDeleteKey + ' 已优雅下线', 'success');
    } else {
      toast(res.message, 'error');
    }
    closeDeleteModal();
    refreshList();
  };
}
function closeDeleteModal() {
  document.getElementById('deleteModal').classList.add('hidden');
  document.getElementById('deleteModal').classList.remove('flex');
  pendingDeleteKey = null;
}

// ==================== Utility ====================
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== Init ====================
refreshList();
// Auto refresh every 15s
setInterval(refreshList, 15000);

// Close modals on backdrop click
document.getElementById('addModal').addEventListener('click', function(e) { if (e.target === this) closeAddModal(); });
document.getElementById('deleteModal').addEventListener('click', function(e) { if (e.target === this) closeDeleteModal(); });
// Close modals on Escape
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeAddModal(); closeDeleteModal(); } });
</script>

</body>
</html>
