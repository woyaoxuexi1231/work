<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JVM 垃圾回收分代假说可视化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 自定义动画样式 */
        .gc-flash {
            animation: flashRed 0.3s ease-in-out;
        }
        @keyframes flashRed {
            0% { background-color: inherit; }
            50% { background-color: rgba(239, 68, 68, 0.2); }
            100% { background-color: inherit; }
        }

        .object-node {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 滚动条隐藏但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen flex flex-col items-center py-8 selection:bg-indigo-500 selection:text-white">

<!-- 头部 -->
<header class="text-center mb-8 max-w-4xl px-4">
    <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent mb-2">
        GC 分代假说与生命周期演示
    </h1>
    <p class="text-slate-400 text-sm md:text-base">
        弱分代假说：绝大多数对象都是朝生夕灭的。<br>
        强分代假说：熬过越多次垃圾收集过程的对象越难以消亡。
    </p>
</header>

<!-- 控制面板 -->
<div class="w-full max-w-6xl px-4 mb-6 flex flex-wrap gap-4 justify-between items-end bg-slate-800/50 p-4 rounded-xl border border-slate-700 backdrop-blur-sm">
    <div class="flex gap-4">
        <button onclick="gcEngine.toggleAuto()" id="btn-auto" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg shadow-lg shadow-indigo-500/20 transition-all flex items-center gap-2">
            <i class="fas fa-play"></i> <span>自动运行</span>
        </button>
        <button onclick="gcEngine.allocateObject()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg shadow-lg shadow-emerald-500/20 transition-all flex items-center gap-2">
            <i class="fas fa-plus"></i> <span>新建对象 (New)</span>
        </button>
        <button onclick="gcEngine.forceMinorGC()" class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white rounded-lg shadow-lg shadow-amber-500/20 transition-all flex items-center gap-2">
            <i class="fas fa-broom"></i> <span>手动 Minor GC</span>
        </button>
    </div>

    <div class="flex flex-col gap-1">
        <label class="text-xs text-slate-400 uppercase tracking-wider font-semibold">对象死亡率 (Mortality Rate)</label>
        <input type="range" id="mortality-rate" min="0" max="100" value="80" class="w-48 accent-indigo-500 cursor-pointer">
        <div class="flex justify-between text-xs text-slate-500">
            <span>长寿</span>
            <span id="rate-display" class="text-indigo-400 font-mono">80%</span>
            <span>速死</span>
        </div>
    </div>
</div>

<!-- 内存可视化区域 -->
<main class="w-full max-w-6xl px-4 grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">

    <!-- 新生代 (Young Generation) -->
    <div class="lg:col-span-8 flex flex-col gap-4">
        <div class="flex justify-between items-center px-2">
            <h2 class="text-lg font-bold text-emerald-400 flex items-center gap-2">
                <i class="fas fa-seedling"></i> 新生代 (Young Gen)
            </h2>
            <span class="text-xs bg-slate-800 px-2 py-1 rounded text-slate-400">Minor GC 频繁发生区</span>
        </div>

        <div class="grid grid-cols-3 gap-4 h-64">
            <!-- Eden Space -->
            <div id="eden-space" class="col-span-2 bg-slate-800/80 rounded-xl border-2 border-dashed border-slate-700 relative overflow-hidden flex flex-col p-3 transition-colors duration-300">
                <div class="absolute top-2 left-3 text-xs font-bold text-slate-500 uppercase tracking-widest z-10 pointer-events-none">Eden Space</div>
                <div class="mt-4 flex flex-wrap content-start gap-2 overflow-y-auto no-scrollbar h-full" id="eden-container">
                    <!-- Objects go here -->
                </div>
                <!-- Progress Bar for Capacity -->
                <div class="absolute bottom-0 left-0 w-full h-1 bg-slate-700">
                    <div id="eden-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Survivor Spaces -->
            <div class="flex flex-col gap-4 h-full">
                <div id="survivor-from" class="flex-1 bg-slate-800/80 rounded-xl border border-slate-700 relative overflow-hidden flex flex-col p-3 transition-colors duration-300">
                    <div class="absolute top-2 left-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest z-10 pointer-events-none">Survivor From</div>
                    <div class="mt-4 flex flex-wrap content-start gap-1 overflow-y-auto no-scrollbar" id="from-container"></div>
                </div>
                <div id="survivor-to" class="flex-1 bg-slate-800/80 rounded-xl border border-slate-700 relative overflow-hidden flex flex-col p-3 transition-colors duration-300">
                    <div class="absolute top-2 left-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest z-10 pointer-events-none">Survivor To</div>
                    <div class="mt-4 flex flex-wrap content-start gap-1 overflow-y-auto no-scrollbar" id="to-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 老年代 (Old Generation) -->
    <div class="lg:col-span-4 flex flex-col gap-4">
        <div class="flex justify-between items-center px-2">
            <h2 class="text-lg font-bold text-purple-400 flex items-center gap-2">
                <i class="fas fa-layer-group"></i> 老年代 (Old Gen)
            </h2>
            <span class="text-xs bg-slate-800 px-2 py-1 rounded text-slate-400">Full GC 发生区</span>
        </div>

        <div id="old-space" class="flex-1 bg-slate-800/80 rounded-xl border-2 border-purple-900/50 relative overflow-hidden flex flex-col p-4 transition-colors duration-300 min-h-[256px]">
            <div class="absolute top-3 left-4 text-xs font-bold text-slate-500 uppercase tracking-widest z-10 pointer-events-none">Tenured Space</div>
            <div class="mt-6 flex flex-wrap content-start gap-2 overflow-y-auto no-scrollbar h-full" id="old-container">
                <!-- Long lived objects -->
            </div>
            <!-- Progress Bar for Capacity -->
            <div class="absolute bottom-0 left-0 w-full h-1 bg-slate-700">
                <div id="old-bar" class="h-full bg-purple-500 transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
    </div>
</main>

<!-- 日志与控制台 -->
<div class="w-full max-w-6xl px-4">
    <div class="bg-black/40 rounded-xl border border-slate-800 p-4 font-mono text-xs md:text-sm h-40 overflow-y-auto shadow-inner" id="console-log">
        <div class="text-slate-500">// System Ready. Waiting for allocation...</div>
    </div>
</div>

<!-- 图例 -->
<div class="mt-8 flex flex-wrap gap-6 text-xs text-slate-400 justify-center">
    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></span> 新对象 (Age 0)</div>
    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-400"></span> 存活对象 (Survivor)</div>
    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-purple-400"></span> 老年代对象 (Old)</div>
    <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-red-500 opacity-50"></span> 被回收 (Garbage)</div>
</div>

<script>
  /**
   * GC 模拟引擎
   */
  class GCEngine {
    constructor() {
      this.eden = [];
      this.survivorFrom = [];
      this.survivorTo = [];
      this.oldGen = [];

      // 配置
      this.maxEdenCapacity = 20;
      this.maxSurvivorCapacity = 10;
      this.maxOldCapacity = 40;
      this.promotionThreshold = 3; // 年龄阈值

      this.isAutoRunning = false;
      this.autoTimer = null;
      this.objectIdCounter = 0;

      // DOM 缓存
      this.dom = {
        eden: document.getElementById('eden-container'),
        from: document.getElementById('from-container'),
        to: document.getElementById('to-container'),
        old: document.getElementById('old-container'),
        edenBar: document.getElementById('eden-bar'),
        oldBar: document.getElementById('old-bar'),
        log: document.getElementById('console-log'),
        rateDisplay: document.getElementById('rate-display'),
        mortalityInput: document.getElementById('mortality-rate')
      };

      // 监听滑块
      this.dom.mortalityInput.addEventListener('input', (e) => {
        this.dom.rateDisplay.textContent = e.target.value + '%';
      });
    }

    log(msg, type = 'info') {
      const colors = {
        info: 'text-slate-300',
        gc: 'text-amber-400',
        alloc: 'text-emerald-400',
        promote: 'text-purple-400',
        error: 'text-red-400'
      };
      const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const div = document.createElement('div');
      div.className = `${colors[type]} mb-1`;
      div.innerHTML = `<span class="opacity-50 mr-2">[${time}]</span>${msg}`;
      this.dom.log.appendChild(div);
      this.dom.log.scrollTop = this.dom.log.scrollHeight;
    }

    getMortalityRate() {
      return parseInt(this.dom.mortalityInput.value) / 100;
    }

    createObjectElement(obj) {
      const el = document.createElement('div');
      el.id = `obj-${obj.id}`;
      el.className = `object-node w-8 h-8 md:w-10 md:h-10 rounded-md flex items-center justify-center text-[10px] font-bold shadow-md cursor-default relative group ${this.getColorByRegion(obj.region)}`;
      el.innerHTML = `
                    ${obj.age}
                    <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-50 pointer-events-none border border-slate-700">
                        ID:${obj.id} | Age:${obj.age}
                    </div>
                `;
      return el;
    }

    getColorByRegion(region) {
      switch(region) {
        case 'eden': return 'bg-emerald-500 text-emerald-950 border border-emerald-400';
        case 'survivor': return 'bg-blue-500 text-white border border-blue-400';
        case 'old': return 'bg-purple-600 text-white border border-purple-400 shadow-purple-500/30';
        default: return 'bg-slate-600';
      }
    }

    allocateObject() {
      if (this.eden.length >= this.maxEdenCapacity) {
        this.log("Eden 区已满，触发 Minor GC...", "gc");
        this.runMinorGC();
        // GC后如果还有空间则继续分配，否则报错（模拟OOM或等待）
        if (this.eden.length >= this.maxEdenCapacity) {
          this.log("GC 后仍无空间，分配失败！", "error");
          return;
        }
      }

      const obj = {
        id: ++this.objectIdCounter,
        age: 0,
        region: 'eden',
        isAlive: true
      };

      this.eden.push(obj);
      this.render();
      this.log(`分配对象 #${obj.id} 到 Eden`, "alloc");
    }

    runMinorGC() {
      const mortalityRate = this.getMortalityRate();
      let deadCount = 0;
      let survivedCount = 0;

      // 视觉特效
      document.getElementById('eden-space').classList.add('gc-flash');
      setTimeout(() => document.getElementById('eden-space').classList.remove('gc-flash'), 300);

      // 1. 处理 Eden 区
      const nextSurvivors = [];
      this.eden.forEach(obj => {
        if (Math.random() > mortalityRate) {
          // 存活
          obj.age++;
          nextSurvivors.push(obj);
          survivedCount++;
        } else {
          deadCount++;
        }
      });
      this.eden = []; // 清空 Eden

      // 2. 处理 Survivor From 区
      const currentFrom = [...this.survivorFrom];
      this.survivorFrom = []; // 清空 From

      currentFrom.forEach(obj => {
        if (Math.random() > mortalityRate) {
          obj.age++;
          // 检查是否晋升
          if (obj.age >= this.promotionThreshold) {
            this.promoteToOld(obj);
          } else {
            nextSurvivors.push(obj);
          }
        } else {
          deadCount++;
        }
      });

      // 3. 交换 Survivor 角色 (Copy Algorithm)
      // 现在的 nextSurvivors 应该放入当前的 To 区
      // 原本的 To 变成下一次的 From

      // 检查 To 区容量溢出处理 (简化版：直接放入，若满则晋升)
      if (nextSurvivors.length > this.maxSurvivorCapacity) {
        const overflow = nextSurvivors.splice(this.maxSurvivorCapacity);
        overflow.forEach(o => this.promoteToOld(o));
        this.log(`Survivor 区溢出，${overflow.length} 个对象担保晋升`, "promote");
      }

      // 更新状态
      this.survivorTo = nextSurvivors.map(o => ({...o, region: 'survivor'}));

      // 角色互换：To -> From, From(Empty) -> To
      [this.survivorFrom, this.survivorTo] = [this.survivorTo, this.survivorFrom];

      this.log(`Minor GC 完成: 回收 ${deadCount} 个, 存活 ${survivedCount} 个`, "gc");
      this.render();
    }

    promoteToOld(obj) {
      if (this.oldGen.length >= this.maxOldCapacity) {
        this.runFullGC();
      }

      if (this.oldGen.length < this.maxOldCapacity) {
        obj.region = 'old';
        this.oldGen.push(obj);
        this.log(`对象 #${obj.id} (Age:${obj.age}) 晋升至老年代`, "promote");
      } else {
        this.log("老年代已满且无法清理，OOM Warning!", "error");
      }
    }

    runFullGC() {
      const mortalityRate = this.getMortalityRate();
      // 老年代对象更难死亡，稍微降低一点死亡率
      const oldMortality = Math.max(0, mortalityRate - 0.2);
      let deadCount = 0;

      document.getElementById('old-space').classList.add('gc-flash');
      setTimeout(() => document.getElementById('old-space').classList.remove('gc-flash'), 300);

      const survivors = [];
      this.oldGen.forEach(obj => {
        if (Math.random() > oldMortality) {
          survivors.push(obj);
        } else {
          deadCount++;
        }
      });

      this.oldGen = survivors;
      this.log(`Full GC 完成: 回收老年代 ${deadCount} 个对象`, "gc");
      this.render();
    }

    forceMinorGC() {
      this.log("用户手动触发 Minor GC", "info");
      this.runMinorGC();
    }

    toggleAuto() {
      this.isAutoRunning = !this.isAutoRunning;
      const btn = document.getElementById('btn-auto');

      if (this.isAutoRunning) {
        btn.innerHTML = '<i class="fas fa-pause"></i> <span>暂停</span>';
        btn.classList.replace('bg-indigo-600', 'bg-rose-600');
        btn.classList.replace('hover:bg-indigo-500', 'hover:bg-rose-500');
        btn.classList.replace('shadow-indigo-500/20', 'shadow-rose-500/20');

        this.autoTimer = setInterval(() => {
          this.allocateObject();
        }, 400);
      } else {
        btn.innerHTML = '<i class="fas fa-play"></i> <span>自动运行</span>';
        btn.classList.replace('bg-rose-600', 'bg-indigo-600');
        btn.classList.replace('hover:bg-rose-500', 'hover:bg-indigo-500');
        btn.classList.replace('shadow-rose-500/20', 'shadow-indigo-500/20');
        clearInterval(this.autoTimer);
      }
    }

    render() {
      // 渲染 Eden
      this.dom.eden.innerHTML = '';
      this.eden.forEach(obj => this.dom.eden.appendChild(this.createObjectElement(obj)));

      // 渲染 Survivor From
      this.dom.from.innerHTML = '';
      this.survivorFrom.forEach(obj => this.dom.from.appendChild(this.createObjectElement(obj)));

      // 渲染 Survivor To
      this.dom.to.innerHTML = '';
      this.survivorTo.forEach(obj => this.dom.to.appendChild(this.createObjectElement(obj)));

      // 渲染 Old
      this.dom.old.innerHTML = '';
      this.oldGen.forEach(obj => this.dom.old.appendChild(this.createObjectElement(obj)));

      // 更新进度条
      const edenPct = (this.eden.length / this.maxEdenCapacity) * 100;
      this.dom.edenBar.style.width = `${edenPct}%`;
      this.dom.edenBar.className = `h-full transition-all duration-300 ${edenPct > 90 ? 'bg-red-500' : 'bg-emerald-500'}`;

      const oldPct = (this.oldGen.length / this.maxOldCapacity) * 100;
      this.dom.oldBar.style.width = `${oldPct}%`;
      this.dom.oldBar.className = `h-full transition-all duration-300 ${oldPct > 90 ? 'bg-red-500' : 'bg-purple-500'}`;
    }
  }

  // 初始化
  const gcEngine = new GCEngine();

  // 初始分配几个对象作为示例
  setTimeout(() => gcEngine.allocateObject(), 500);
  setTimeout(() => gcEngine.allocateObject(), 800);
  setTimeout(() => gcEngine.allocateObject(), 1100);

</script>
</body>
</html>
