# ========== 服务器配置 ==========
server:
  port: 0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

# ========== Spring 配置 ==========
spring:
  application:
    name: work
  main:
    allow-circular-references: true
  profiles:
    active: nacos


  # 开发工具
  devtools:
    restart:
      additional-paths: src/main/java
      enabled: true
    livereload:
      port: 35729
      enabled: true

  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 465
    username: 154347188@qq.com
    password: gmvniasmudylbhbg
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false

  # 数据源
  datasource:
    url: jdbc:mysql://192.168.3.100:3306/test?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4&rewriteBatchedStatements=true&allowMultiQueries=true&useCursorFetch=true
    username: root
    password: 123456

  # JPA
  jpa:
    database: mysql
    hibernate:
      ddl-auto: none
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis
  data:
    redis:
      host: 192.168.3.100
      port: 6379
      password: 123456
      timeout: 5000
      database: 0

    # MongoDB
    mongodb:
      host: 192.168.3.100
      port: 27017
      database: demo_db

  # Elasticsearch
  elasticsearch:
    uris: http://192.168.3.100:9200

  # RabbitMQ
  rabbitmq:
    addresses: 192.168.3.100
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

  # Kafka 配置
  kafka:
    bootstrap-servers: 192.168.3.100:9092  # Kafka 服务器地址（Docker 网络）
    consumer: # 配置消费者
      group-id: kafka-demo-group   # 消费者组 ID
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest  # 消费起始位置
#      enable-auto-commit: false    # 禁用自动提交
#      max-poll-records: 100        # 每次拉取最大记录数
#      properties:
#        spring.json.trusted.packages: "*"  # 信任所有包的反序列化
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
#      acks: all                    # 等待所有副本确认
#      retries: 3                   # 重试次数
#      batch-size: 16384            # 批处理大小
#      linger-ms: 1                 # 延迟发送时间
#      buffer-memory: 33554432      # 缓冲区内存大小


# ========== RocketMQ 配置 (版本 2.3.5) ==========
rocketmq:
  name-server: 192.168.3.100:9876  # NameServer 地址
  producer:
    group: demo-producer-group     # 生产者组名
    send-message-timeout: 3000     # 发送消息超时时间（毫秒）
    retry-times-when-send-failed: 2  # 发送失败重试次数
    compress-msg-body-over-howmuch: 4096  # 消息压缩阈值（字节）
    max-message-size: 4194304      # 最大消息大小（字节）
  consumer:
    group: demo-consumer-group     # 消费者组名
    consume-thread-min: 5          # 消费线程最小数量
    consume-thread-max: 20         # 消费线程最大数量
    consume-message-batch-max-size: 1  # 批量消费最大消息数量

##################################  ORM框架配置  ##################################

# ========== MyBatis 配置 ==========
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    local-cache-scope: statement    # 一级缓存范围：SESSION/STATEMENT
    cache-enabled: false           # 是否开启二级缓存
    lazy-loading-enabled: true     # 开启懒加载
    aggressive-lazy-loading: false # 关闭激进懒加载
  mapper-locations: classpath:mapper/*.xml

# ========== MyBatis-Plus 配置 ==========
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    local-cache-scope: statement    # 一级缓存范围：SESSION/STATEMENT
    cache-enabled: false           # 是否开启二级缓存
    lazy-loading-enabled: true     # 开启懒加载
    aggressive-lazy-loading: false # 关闭激进懒加载
  mapper-locations: classpath*:mapper/*.xml

# ========== PageHelper 配置 ==========
pagehelper:
  auto-runtime-dialect: true  # 自动识别数据库 dialect
  page-size-zero: true        # pageSize=0 时查询全部数据

##################################  监控和指标配置  ##################################

# ========== 端点暴露配置 ==========
management:
  endpoints:
    web:
      exposure:
        include: '*'  # 暴露所有端点
  endpoint:
    shutdown:
      enabled: true   # 启用 shutdown 端点
    health:
      show-details: always  # 显示健康检查详情
    prometheus:
      enabled: true   # 启用 Prometheus 端点
  prometheus:
    metrics:
      export:
        enabled: true # 启用指标导出

##################################  日志配置  ##################################

logging:
  level:
    org.hulei: debug  # 设置项目包的日志级别为 DEBUG
    org.springframework.security: debug  # Spring Security 日志
    org.apache.rocketmq: info            # RocketMQ 日志级别

# ========== ID 生成器配置 ==========
curator:
  enable: true
  retry-count: 4
  elapsed-time-ms: 500
  session-timeout-ms: 60000
  connection-timeout-ms: 10000
  connect-string: 192.168.3.100:2181