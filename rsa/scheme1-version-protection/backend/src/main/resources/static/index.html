<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版本防篡改方案 Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
<div class="glass p-8 w-full max-w-xl shadow-2xl text-white">
    <h1 class="text-2xl font-bold mb-4 text-center">版本号防篡改（基础版）</h1>

    <div class="bg-white/10 p-4 rounded-lg mb-4">
        <div class="text-sm opacity-90">最新公钥版本: <span id="latest-ver" class="font-mono font-bold">加载中...</span></div>
        <div class="text-xs opacity-70 mt-1">学习点：攻击者可以篡改外层 version，但篡改不了 token 的签名，所以服务端能识别并拒绝。</div>
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">敏感数据</label>
            <input type="text" id="sensitive-data" value="Hello, version-protected world!"
                   class="w-full bg-white/10 border border-white/20 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400">
        </div>

        <div class="border-t border-white/10 pt-4">
            <label class="block text-sm font-medium mb-1 text-orange-200">模拟攻击：篡改 version（降级攻击入口）</label>
            <select id="attack-version" class="w-full bg-white/10 border border-white/20 rounded px-3 py-2 text-white">
                <option value="">不篡改（正常）</option>
                <option value="1">强制传 v1（模拟降级攻击）</option>
            </select>
            <p class="text-xs opacity-80 mt-1">如果选择 v1：外层 version 会被改成 1，但 token 还是 v2 的签名，服务端应该直接拒绝。</p>
        </div>

        <button onclick="handleSubmit()" id="btn-send"
                class="w-full bg-purple-600 hover:bg-purple-700 transition-colors py-3 rounded-lg font-bold shadow-lg">
            加密并发送
        </button>

        <div>
            <div class="text-sm font-medium mb-2">执行日志</div>
            <div id="logs" class="bg-black/30 rounded p-3 h-56 overflow-y-auto text-xs font-mono space-y-1"></div>
        </div>
    </div>
</div>

<script>
    let keyPack = null;

    function uiLog(msg, type = "info") {
        const logs = document.getElementById("logs");
        const div = document.createElement("div");
        const colors = { info: "text-blue-200", success: "text-green-300", error: "text-red-300", warn: "text-yellow-200" };
        div.className = colors[type] || colors.info;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logs.appendChild(div);
        logs.scrollTop = logs.scrollHeight;
    }

    async function fetchKey() {
        try {
            uiLog("请求 /api/key/latest 获取 {version, publicKey, token} ...");
            const res = await fetch("/api/key/latest");
            keyPack = await res.json();
            document.getElementById("latest-ver").textContent = "v" + keyPack.version;
            uiLog("获取成功：version=v" + keyPack.version, "success");
        } catch (e) {
            uiLog("获取失败：" + e.message, "error");
        }
    }

    async function handleSubmit() {
        if (typeof forge === "undefined") {
            uiLog("node-forge 未加载，检查网络或 CDN", "error");
            return;
        }
        if (!keyPack) return;

        const btn = document.getElementById("btn-send");
        btn.disabled = true;
        btn.textContent = "处理中...";

        try {
            const plaintext = document.getElementById("sensitive-data").value;
            const attackVersion = document.getElementById("attack-version").value;
            const submitVersion = attackVersion || keyPack.version;

            uiLog(`开始加密：真实版本=v${keyPack.version}，提交版本=v${submitVersion}`);

            const aesKey = forge.random.getBytesSync(16);

            const publicKey = forge.pki.publicKeyFromPem(keyPack.publicKey);
            const encryptedKey = publicKey.encrypt(aesKey); // RSA PKCS1 v1.5（基础）

            const cipher = forge.cipher.createCipher("AES-ECB", aesKey);
            cipher.start();
            cipher.update(forge.util.createBuffer(plaintext, "utf8"));
            cipher.finish();
            const encryptedDataBase64 = forge.util.encode64(cipher.output.getBytes());

            const payload = {
                version: submitVersion,
                token: keyPack.token,
                encryptedKey: forge.util.encode64(encryptedKey),
                encryptedData: encryptedDataBase64
            };

            uiLog("发送 POST /api/decrypt ...");
            const res = await fetch("/api/decrypt", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const text = await res.text();
            if (res.ok) {
                uiLog("服务端解密成功: " + text, "success");
            } else {
                uiLog("服务端拒绝: " + text, "error");
            }
        } catch (e) {
            uiLog("出错: " + e.message, "error");
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.textContent = "加密并发送";
        }
    }

    fetchKey();
</script>
</body>
</html>
