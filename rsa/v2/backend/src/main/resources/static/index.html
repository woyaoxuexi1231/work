<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v2：加上响应签名</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
<div class="glass p-8 w-full max-w-xl shadow-2xl text-white">
    <h1 class="text-2xl font-bold mb-4 text-center">v2：RSA(PKCS1) + AES(ECB) + 响应签名</h1>

    <div class="bg-white/10 p-4 rounded-lg mb-4">
        <div class="text-sm opacity-90">服务端公钥: <span id="key-status" class="font-mono font-bold">加载中...</span></div>
        <div class="text-xs opacity-70 mt-1">学习点：RSA 只用来“包 AES Key”，业务数据用 AES 来加密。</div>
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">敏感数据</label>
            <input type="text" id="sensitive-data" value="Hello, version-protected world!"
                   class="w-full bg-white/10 border border-white/20 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400">
        </div>

        <button onclick="handleSubmit()" id="btn-send"
                class="w-full bg-purple-600 hover:bg-purple-700 transition-colors py-3 rounded-lg font-bold shadow-lg">
            加密并发送
        </button>

        <div>
            <div class="text-sm font-medium mb-2">执行日志</div>
            <div id="logs" class="bg-black/30 rounded p-3 h-56 overflow-y-auto text-xs font-mono space-y-1"></div>
        </div>
    </div>
</div>

<script>
    let keyInfo = null;

    function uiLog(msg, type = "info") {
        const logs = document.getElementById("logs");
        const div = document.createElement("div");
        const colors = { info: "text-blue-200", success: "text-green-300", error: "text-red-300", warn: "text-yellow-200" };
        div.className = colors[type] || colors.info;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logs.appendChild(div);
        logs.scrollTop = logs.scrollHeight;
    }

    async function fetchKey() {
        try {
            uiLog("请求 GET /api/key 获取公钥 ...");
            const res = await fetch("/api/key");
            keyInfo = await res.json();
            document.getElementById("key-status").textContent = "已加载";
            uiLog("获取成功：" + keyInfo.algorithm, "success");
        } catch (e) {
            uiLog("获取失败：" + e.message, "error");
        }
    }

    async function handleSubmit() {
        if (typeof forge === "undefined") {
            uiLog("node-forge 未加载，检查网络或 CDN", "error");
            return;
        }
        if (!keyInfo) return;

        const btn = document.getElementById("btn-send");
        btn.disabled = true;
        btn.textContent = "处理中...";

        try {
            const plaintext = document.getElementById("sensitive-data").value;

            uiLog("开始加密：AES-ECB 加密业务数据 + RSA 加密 AES Key");

            const aesKey = forge.random.getBytesSync(16);

            const publicKey = forge.pki.publicKeyFromPem(keyInfo.publicKey);
            const encryptedKey = publicKey.encrypt(aesKey); // RSA PKCS1 v1.5（基础）

            const cipher = forge.cipher.createCipher("AES-ECB", aesKey);
            cipher.start();
            cipher.update(forge.util.createBuffer(plaintext, "utf8"));
            cipher.finish();
            const encryptedDataBase64 = forge.util.encode64(cipher.output.getBytes());

            const payload = {
                encryptedKey: forge.util.encode64(encryptedKey),
                encryptedData: encryptedDataBase64
            };

            uiLog("发送 POST /api/secure/echo ...");
            const res = await fetch("/api/secure/echo", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const text = await res.text();
            if (!res.ok) {
                uiLog("服务端拒绝: " + text, "error");
                return;
            }

            /*
            收到的密文 → SHA256 → 哈希 H_client
            收到的签名 S → 公钥操作(S) → H_recovered
            比较 H_client 和 H_recovered
             */

            // 拿到密文和签名的原始字节
            const response = JSON.parse(text);
            const responseEncryptedBytes = forge.util.decode64(response.encryptedData);
            const sigBytes = forge.util.decode64(response.signature);

            // 客户端自己计算密文的 SHA-256 摘要
            const md = forge.md.sha256.create(); // 创建一个 SHA-256 哈希对象。
            md.update(responseEncryptedBytes); // 把收到的密文字节喂进去，这一步完全复现了服务端签名时 signature.update(encrypted) 的操作。此时 md 内部已经算出了密文的哈希值（但还没输出最终摘要）。

            // md.digest().bytes() 正式完成 SHA-256 计算，输出密文的 32 字节哈希值，记为 H_client。
            // 用 RSA 公钥 对签名 sigBytes 执行公钥操作：H_recovered = sigBytes^e mod n 这就是我们之前说的“公钥解密签名”，从中恢复出原始哈希。
            // 比较 H_recovered 和传入的 H_client，如果完全相同则返回 true，否则返回 false。
            const verified = publicKey.verify(md.digest().bytes(), sigBytes);
            if (!verified) {
                uiLog("验签失败：响应可能被篡改", "error");
                return;
            }
            uiLog("验签成功：响应未被篡改", "success");
            const decipher = forge.cipher.createDecipher("AES-ECB", aesKey);
            decipher.start();
            decipher.update(forge.util.createBuffer(responseEncryptedBytes));
            const ok = decipher.finish();
            if (!ok) {
                uiLog("响应解密失败：AES-ECB 解密失败", "error");
                return;
            }
            const responsePlaintext = forge.util.decodeUtf8(decipher.output.getBytes());
            uiLog("响应解密成功: " + responsePlaintext, "success");
        } catch (e) {
            uiLog("出错: " + e.message, "error");
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.textContent = "加密并发送";
        }
    }

    fetchKey();
</script>
</body>
</html>
