<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA Version Protection Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/node-forge/1.3.1/forge.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass p-8 w-full max-w-lg shadow-2xl text-white">
        <h1 class="text-3xl font-bold mb-6 text-center">RSA 加密上报</h1>
        
        <div class="space-y-4">
            <!-- Key Info -->
            <div class="bg-white/10 p-4 rounded-lg">
                <p class="text-sm opacity-80">当前后端最新密钥版本: <span id="latest-ver" class="font-mono font-bold">加载中...</span></p>
            </div>

            <!-- Input Area -->
            <div>
                <label class="block text-sm font-medium mb-1">敏感数据</label>
                <input type="text" id="sensitive-data" value="Hello, secure world!" 
                    class="w-full bg-white/10 border border-white/20 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400">
            </div>

            <!-- Attack Simulator -->
            <div class="border-t border-white/10 pt-4">
                <label class="block text-sm font-medium mb-1 text-orange-300">模拟降级攻击：强制传旧版本号</label>
                <select id="attack-version" class="w-full bg-white/10 border border-white/20 rounded px-3 py-2 text-white">
                    <option value="">(不篡改，使用最新)</option>
                    <option value="1">强制传版本 v1 (模拟降级攻击)</option>
                </select>
                <p class="text-xs text-orange-200 mt-1 italic">提示：即便你传了v1，后端会校验Token和密文内的版本锁定。</p>
            </div>

            <!-- Action -->
            <button onclick="handleSubmit()" id="btn-send"
                class="w-full bg-purple-600 hover:bg-purple-700 transition-colors py-3 rounded-lg font-bold shadow-lg">
                加密并发送
            </button>

            <!-- Result Area -->
            <div class="mt-6">
                <p class="text-sm font-medium mb-2">执行日志:</p>
                <div id="logs" class="bg-black/30 rounded p-3 h-48 overflow-y-auto text-xs font-mono space-y-1">
                </div>
            </div>
        </div>
    </div>

    <script>
        let serverKeyInfo = null;

        async function log(msg, type = 'info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const colors = { info: 'text-blue-300', success: 'text-green-400', error: 'text-red-400', warn: 'text-yellow-300' };
            div.className = colors[type];
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        async function fetchLatestKey() {
            try {
                log("获取最新公钥...");
                const res = await fetch('/api/key/latest');
                serverKeyInfo = await res.json();
                document.getElementById('latest-ver').textContent = serverKeyInfo.version;
                log(`获取成功: v${serverKeyInfo.version}`, 'success');
            } catch (e) {
                log("获取公钥失败: " + e.message, 'error');
            }
        }

        async function handleSubmit() {
            if (!serverKeyInfo) return;
            const btn = document.getElementById('btn-send');
            btn.disabled = true;
            btn.textContent = "处理中...";

            try {
                const plaintext = document.getElementById('sensitive-data').value;
                const attackVer = document.getElementById('attack-version').value;
                const versionToSubmit = attackVer || serverKeyInfo.version;

                log(`开始加密 (使用 v${serverKeyInfo.version} 公钥)...`);

                // 1. 生成随机 AES 密钥和 IV
                const aesKey = forge.random.getBytesSync(16);
                const iv = forge.random.getBytesSync(12);

                // 2. 构建 RSA keyMaterial: version(4) | timestamp(8) | SK(16)
                const buffer = forge.util.createBuffer();
                buffer.putInt32(parseInt(serverKeyInfo.version));
                buffer.putInt64(Date.now()); // simplified timestamp
                buffer.putBytes(aesKey);
                const keyMaterial = buffer.getBytes();

                // 3. RSA 加密 keyMaterial
                const publicKey = forge.pki.publicKeyFromPem(serverKeyInfo.publicKey);
                const encryptedKey = publicKey.encrypt(keyMaterial, 'RSA-OAEP', {
                    md: forge.md.sha256.create(),
                    mgf1: { md: forge.md.sha256.create() }
                });

                // 4. AES-GCM 加密数据，AAD 为版本号
                const cipher = forge.cipher.createCipher('AES-GCM', aesKey);
                cipher.start({
                    iv: iv,
                    additionalData: serverKeyInfo.version // AAD
                });
                cipher.update(forge.util.createBuffer(plaintext, 'utf8'));
                cipher.finish();
                const encryptedData = cipher.output.getBytes();
                const tag = cipher.mode.tag.getBytes();

                // 5. 发送请求
                log(`发送请求: 提交版本=${versionToSubmit}, 实际加密版本=${serverKeyInfo.version}`);
                const payload = {
                    version: versionToSubmit,
                    token: serverKeyInfo.token,
                    encryptedKey: forge.util.encode64(encryptedKey),
                    encryptedData: forge.util.encode64(encryptedData + tag),
                    iv: forge.util.encode64(iv)
                };

                const res = await fetch('/api/decrypt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.text();
                if (res.ok) {
                    log(`服务端解密成功: ${result}`, 'success');
                } else {
                    log(`服务端拒绝: ${result}`, 'error');
                }

            } catch (e) {
                log("加密过程出错: " + e.message, 'error');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.textContent = "加密并发送";
            }
        }

        // Init
        fetchLatestKey();
    </script>
</body>
</html>
