<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA + AES 复合加密 Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass p-8 w-full max-w-lg shadow-2xl text-white">
        <h1 class="text-3xl font-bold mb-6 text-center">RSA + AES 复合加密</h1>
        
        <div class="space-y-4">
            <!-- Key Info -->
            <div class="bg-white/10 p-4 rounded-lg">
                <p class="text-sm opacity-80">服务端公钥状态: <span id="key-status" class="font-mono font-bold">加载中...</span></p>
                <p class="text-xs opacity-70 mt-1">提示：前端每次请求都会随机生成 AES Key，用它加密业务数据；RSA 只负责加密 AES Key。</p>
            </div>

            <!-- Input Area -->
            <div>
                <label class="block text-sm font-medium mb-1">敏感数据</label>
                <input type="text" id="sensitive-data" value="Hello, secure world!" 
                    class="w-full bg-white/10 border border-white/20 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400">
            </div>

            <!-- Action -->
            <button onclick="handleSubmit()" id="btn-send"
                class="w-full bg-purple-600 hover:bg-purple-700 transition-colors py-3 rounded-lg font-bold shadow-lg">
                加密并发送
            </button>

            <!-- Result Area -->
            <div class="mt-6">
                <p class="text-sm font-medium mb-2">执行日志:</p>
                <div id="logs" class="bg-black/30 rounded p-3 h-48 overflow-y-auto text-xs font-mono space-y-1">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 存储服务端返回的公钥
        let serverKeyInfo = null;

        /**
         * 模拟 UI 日志输出
         */
        async function log(msg, type = 'info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const colors = { info: 'text-blue-300', success: 'text-green-400', error: 'text-red-400', warn: 'text-yellow-300' };
            div.className = colors[type];
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        /**
         * 初始化：从服务端获取 RSA 公钥
         */
        async function fetchKey() {
            try {
                log("正在获取服务端 RSA 公钥...");
                const res = await fetch('/api/key');
                serverKeyInfo = await res.json();
                document.getElementById('key-status').textContent = "已加载";
                log(`公钥获取成功，算法提示: ${serverKeyInfo.algorithm}`, 'success');
            } catch (e) {
                log("获取密钥失败，请检查后端服务是否启动: " + e.message, 'error');
            }
        }

        /**
         * 核心提交逻辑：模拟客户端加密上报
         */
        async function handleSubmit() {
            if (typeof forge === 'undefined') {
                log("错误: 加密库 node-forge 未能加载，请检查网络或更换 CDN", 'error');
                return;
            }
            if (!serverKeyInfo) return;
            const btn = document.getElementById('btn-send');
            btn.disabled = true;
            btn.textContent = "正在处理加密...";

            try {
                const plaintext = document.getElementById('sensitive-data').value;
                log("开始复合加密流程：AES 加密业务数据 + RSA 加密 AES Key ...");

                // --- 1. 对称加密准备 ---
                // 生成随机 128位 AES 密钥和 96位 IV (GCM 推荐)
                const aesKey = forge.random.getBytesSync(16);
                const iv = forge.random.getBytesSync(12);

                // --- 2. RSA 加密 AES Key ---
                // 注意：RSA 不适合直接加密业务数据（长度限制、性能差），所以我们只用它来加密 AES Key
                log("执行 RSA-OAEP 加密 AES Key ...");
                const publicKey = forge.pki.publicKeyFromPem(serverKeyInfo.publicKey);
                const encryptedKey = publicKey.encrypt(aesKey, 'RSA-OAEP', {
                    md: forge.md.sha256.create(),
                    mgf1: { md: forge.md.sha256.create() }
                });

                // --- 3. AES-GCM 加密业务数据 ---
                log("执行 AES-GCM 加密业务数据 ...");
                const cipher = forge.cipher.createCipher('AES-GCM', aesKey);
                cipher.start({
                    iv: iv
                });
                cipher.update(forge.util.createBuffer(plaintext, 'utf8'));
                cipher.finish();
                const encryptedData = cipher.output.getBytes();
                const tag = cipher.mode.tag.getBytes(); // GCM 认证标签

                // --- 4. 组装并发送 ---
                const payload = {
                    encryptedKey: forge.util.encode64(encryptedKey),
                    encryptedData: forge.util.encode64(encryptedData + tag),
                    iv: forge.util.encode64(iv)
                };

                log("向后端发送加密请求...");
                const res = await fetch('/api/secure/echo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resultText = await res.text();
                if (res.ok) {
                    const response = JSON.parse(resultText);

                    // --- 5. 验签（对应“服务端用私钥加密”的正确理解：数字签名） ---
                    const responseIvBytes = forge.util.decode64(response.iv);
                    const responseEncryptedBytes = forge.util.decode64(response.encryptedData);
                    const responseSignatureBytes = forge.util.decode64(response.signature);

                    const md = forge.md.sha256.create();
                    md.update(responseIvBytes + responseEncryptedBytes);
                    const verified = publicKey.verify(md.digest().bytes(), responseSignatureBytes);
                    if (!verified) {
                        log("验签失败：响应可能被篡改（或公钥不匹配）", 'error');
                        return;
                    }
                    log("验签成功：响应确实来自服务端，且未被篡改", 'success');

                    // --- 6. 解密响应（使用同一个 AES Key） ---
                    // Java 返回的 AES-GCM 密文是“ciphertext + tag”，我们需要把最后 16 字节拆出来作为 tag
                    const combined = responseEncryptedBytes;
                    const tagLen = 16;
                    const cipherTextOnly = combined.substring(0, combined.length - tagLen);
                    const tagOnly = combined.substring(combined.length - tagLen);

                    const decipher = forge.cipher.createDecipher('AES-GCM', aesKey);
                    decipher.start({
                        iv: responseIvBytes,
                        tag: forge.util.createBuffer(tagOnly)
                    });
                    decipher.update(forge.util.createBuffer(cipherTextOnly));
                    const ok = decipher.finish();
                    if (!ok) {
                        log("响应解密失败：GCM 校验不通过", 'error');
                        return;
                    }
                    const responsePlaintext = forge.util.decodeUtf8(decipher.output.getBytes());
                    log(`响应解密成功: "${responsePlaintext}"`, 'success');
                } else {
                    log(`后端拒绝请求: ${resultText}`, 'error');
                }

            } catch (e) {
                log("加密过程出错: " + e.message, 'error');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.textContent = "加密并发送";
            }
        }

        // 页面加载后立即获取公钥
        fetchKey();
    </script>
</body>
</html>
