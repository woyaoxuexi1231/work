        username: root
        password: 123456
        max-pool-size: 8
        min-idle: 1
      - key: trade_broker
        name: 交易系统B库
        datasource-type: TRADE_BROKER
        url: jdbc:mysql://192.168.3.100:3306/trade_broker?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
        username: root
        password: 123456
        max-pool-size: 8
