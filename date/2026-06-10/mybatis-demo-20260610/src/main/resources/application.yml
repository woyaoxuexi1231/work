spring:
  datasource:
    url: jdbc:mysql://192.168.3.100:3306/mybatis_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  sql:
    init:
      mode: always            # 每次启动执行 schema.sql + data.sql
      continue-on-error: true # 表已存在时不报错

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.demo.mybatis.entity
  configuration:
    map-underscore-to-camel-case: true   # 自动下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志输出到控制台

logging:
  level:
    com.demo.mybatis.mapper: DEBUG
