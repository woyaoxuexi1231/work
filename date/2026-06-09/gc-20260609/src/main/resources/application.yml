# ============================================================
# gc-20260609 配置文件
# 模拟"线上接口偶发性突然很慢" —— GC 场景
# ============================================================

server:
  port: 8200

spring:
  application:
    name: gc-20260609

# 日志级别
logging:
  level:
    com.example.gc20260609: INFO
    # 关闭 Spring 框架的大量日志，方便观察 GC 相关输出
    org.springframework: WARN
    org.apache: WARN

# ============================================================
# JVM 启动参数（重要！请在启动命令中加上）
# ============================================================
#
# ┌─────────────────────────────────────────────────────────────────┐
# │  场景一：开启 GC 日志（推荐，生产环境也应该开启）                   │
# │                                                                 │
# │  mvn spring-boot:run -Dspring-boot.run.jvmArguments=" \          │
# │    -Xms128m -Xmx128m \                                         │
# │    -XX:+UseParallelGC \                                         │
# │    -XX:+PrintGCDetails \                                        │
# │    -XX:+PrintGCDateStamps \                                     │
# │    -Xloggc:./gc.log"                                            │
# │                                                                 │
# │  或打包后运行：                                                   │
# │  java -Xms128m -Xmx128m \                                      │
# │    -XX:+UseParallelGC \                                         │
# │    -XX:+PrintGCDetails -XX:+PrintGCDateStamps \                 │
# │    -Xloggc:./gc.log \                                           │
# │    -jar target/gc-20260609-1.0.0.jar                            │
# ├─────────────────────────────────────────────────────────────────┤
# │  场景二：不开启 GC 日志（模拟"裸奔"的生产环境）                    │
# │                                                                 │
# │  mvn spring-boot:run -Dspring-boot.run.jvmArguments="\          │
# │    -Xms128m -Xmx128m \                                         │
# │    -XX:+UseParallelGC"                                          │
# │                                                                 │
# │  或打包后运行：                                                   │
# │  java -Xms128m -Xmx128m \                                      │
# │    -XX:+UseParallelGC \                                         │
# │    -jar target/gc-20260609-1.0.0.jar                            │
# └─────────────────────────────────────────────────────────────────┘
#
# 参数说明：
#   -Xms128m -Xmx128m       固定堆大小 128MB（故意设小，加速 Full GC）
#   -XX:+UseParallelGC       使用 Parallel GC（JDK 8 默认，Full GC 是 STW 的）
#   -XX:+PrintGCDetails      打印 GC 详细信息（JDK 8 写法）
#   -XX:+PrintGCDateStamps   打印 GC 时间戳
#   -Xloggc:./gc.log         GC 日志输出到文件
#
# ⚠️ JDK 9+ 的 GC 日志写法变了：
#   -Xlog:gc*:file=gc.log:time,uptime,level,tags:filecount=5,filesize=10m
#   替代 -XX:+PrintGCDetails、-XX:+PrintGCDateStamps、-Xloggc
