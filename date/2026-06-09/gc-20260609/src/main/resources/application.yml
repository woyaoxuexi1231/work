server:
  port: 8200

spring:
  application:
    name: gc-20260609

# 日志级别
logging:
  level:
    com.example.gc20260609: INFO
    # 关闭 Spring 框架的大量日志，方便观察 GC 相关输出
    org.springframework: WARN
    org.apache: WARN