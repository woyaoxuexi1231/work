server:
  port: 12003

eureka:
  server:
    enable-self-preservation: false
  instance:
    prefer-ip-address: true
    hostname: peer3
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone:
        - http://peer1:12001/eureka/
        - http://peer2:12002/eureka/
