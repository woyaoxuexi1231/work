server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: eureka-server

eureka:
  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_HOSTNAME:eureka1}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka1:8761/eureka/,http://eureka2:8761/eureka/,http://eureka3:8761/eureka/}
  server:
    # AP 核心：开启自我保护，心跳低于阈值不剔除（宁可误留也不误杀）
    enable-self-preservation: true
    # 心跳续约阈值：低于 85% 就触发自我保护（3节点停1个=66%，直接触发）
    renewal-percent-threshold: 0.85
    # 节点间复制超时（Docker Desktop 网络可能慢）
    peer-node-read-timeout-ms: 5000
