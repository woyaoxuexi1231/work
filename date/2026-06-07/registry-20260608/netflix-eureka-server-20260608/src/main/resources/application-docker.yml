server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: eureka-server

eureka:
  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_HOSTNAME:eureka1}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka1:8761/eureka/,http://eureka2:8761/eureka/,http://eureka3:8761/eureka/}
  server:
    # 测试用：关闭自我保护，停掉的节点会被剔除
    enable-self-preservation: false
    renewal-percent-threshold: 0.85
    # 剔除检查间隔（默认60s，调短便于观察）
    eviction-interval-timer-in-ms: 5000
    # 节点间复制超时（默认 200ms，Docker Desktop 可能不够）
    peer-node-read-timeout-ms: 5000
