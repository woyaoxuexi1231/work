server:
  port: 8081

spring:
  application:
    name: nacos-demo
  cloud:
    nacos:
      # Nacos 服务端地址 (Docker 安装默认 8848 端口)
      server-addr: ${NACOS_SERVER_ADDR:host.docker.internal:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: public
        group: DEFAULT_GROUP
        # 临时实例使用 Distro 协议(AP)，持久实例使用 Raft 协议(CP)
        ephemeral: true
      config:
        file-extension: yaml

# 禁用 config import 避免启动时找不到 Nacos 时报错 (开发阶段)
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml

# Actuator 端点暴露
management:
  endpoints:
    web:
      exposure:
        include: health,info,serviceregistry
