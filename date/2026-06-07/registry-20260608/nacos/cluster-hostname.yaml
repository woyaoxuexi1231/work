version: "3.8"
services:
  nacos1:
    hostname: nacos1
    container_name: nacos1
    image: nacos/nacos-server:${NACOS_VERSION}
    volumes:
      - ./cluster-logs/nacos1:/home/nacos/logs
      - ./cluster-data/nacos1:/home/nacos/data
    ports:
      - "7848:7848"
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    env_file:
      - ./nacos-hostname.env
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nacos2:
    hostname: nacos2
    image: nacos/nacos-server:${NACOS_VERSION}
    container_name: nacos2
    volumes:
      - ./cluster-logs/nacos2:/home/nacos/logs
      - ./cluster-data/nacos2:/home/nacos/data
    ports:
      - "7849:7848"
      - "8849:8848"
      - "9849:9848"
      - "9850:9849"
    env_file:
      - ./nacos-hostname.env
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nacos3:
    hostname: nacos3
    image: nacos/nacos-server:${NACOS_VERSION}
    container_name: nacos3
    volumes:
      - ./cluster-logs/nacos3:/home/nacos/logs
      - ./cluster-data/nacos3:/home/nacos/data
    ports:
      - "7850:7848"
      - "8850:8848"
      - "9851:9848"
      - "9852:9849"
    env_file:
      - ./nacos-hostname.env
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
