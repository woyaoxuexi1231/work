server:
  port: 18082

spring:
  application:
    name: order-demo-nacos-20260609
  cloud:
    nacos:
      discovery:
        # Nacos 集群配置（多个地址用逗号分隔）
        server-addr: 192.168.3.100:8848,192.168.3.100:8849,192.168.3.100:8850
        namespace: public
        cluster-name: DEFAULT
        # CP 模式：持久实例
        ephemeral: false
        # 命名空间使用空字符串表示 public
        metadata:
          mode: CP
          cluster: nacos-cluster-3nodes