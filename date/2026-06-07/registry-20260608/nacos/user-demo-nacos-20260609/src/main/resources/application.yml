server:
  port: 18081

spring:
  application:
    name: user-demo-nacos-20260609
  cloud:
    nacos:
      discovery:
        # Nacos 集群配置（多个地址用逗号分隔）
        server-addr: 192.168.3.100:8848,192.168.3.100:8849,192.168.3.100:8850
        namespace: public
        cluster-name: DEFAULT
        # AP 模式：临时实例
        ephemeral: true
        # 命名空间使用空字符串表示 public
        metadata:
          mode: AP
          cluster: nacos-cluster-3nodes