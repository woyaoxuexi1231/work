server:
  port: 8082

spring:
  application:
    name: eureka-demo

# Eureka Client 配置
eureka:
  client:
    # Eureka Server 地址 (Docker 安装默认 8761 端口)
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    # 是否注册到 Eureka Server
    register-with-eureka: true
    # 是否从 Eureka Server 拉取注册表
    fetch-registry: true
    # 心跳间隔 (默认 30s)
    registry-fetch-interval-seconds: 10
  instance:
    # 使用 IP 注册 (非 hostname)
    prefer-ip-address: true
    # 实例 ID 格式: ip:port
    instance-id: ${spring.cloud.client.ip-address}:${server.port}
    # 心跳续约间隔 (默认 30s，缩短便于演示)
    lease-renewal-interval-in-seconds: 10
    # 实例过期时间 (默认 90s)
    lease-expiration-duration-in-seconds: 30

# Actuator 端点暴露
management:
  endpoints:
    web:
      exposure:
        include: health,info,serviceregistry
