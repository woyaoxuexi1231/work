server:
  port: 8080

spring:
  application:
    name: redis-code-0531

  # ====== 默认使用单机 Redis ======
  profiles:
    active: cluster

  # ====== MySQL：SAGA 事务日志 & 迁移状态机 ======
  datasource:
    url: jdbc:mysql://localhost:3306/redis_demo?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  # ====== 演示用线程池 ======
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

# ====== 统一日志 ======
logging:
  level:
    com.redis.demo: DEBUG
    org.springframework.data.redis: INFO

---
# ================================================================
#  profile: standalone  — 单机 Redis（默认）
#  redis-cli: redis-cli -h localhost -p 6379 -a 123456
# ================================================================
spring:
  config:
    activate:
      on-profile: standalone
  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 2
        max-wait: 3000ms

---
# ================================================================
#  profile: sentinel  — 哨兵模式
#  主: 6379  从: 6380,6381  哨兵: 26379,26380,26381
#  redis-cli: redis-cli -h localhost -p 26379 -a 123456 sentinel masters
# ================================================================
spring:
  config:
    activate:
      on-profile: sentinel
  redis:
    password: 123456
    timeout: 3000ms
    sentinel:
      master: mymaster
      nodes:
        - localhost:26379
        - localhost:26380
        - localhost:26381
      password: 123456
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 2
        max-wait: 3000ms

---
# ================================================================
#  profile: cluster  — 集群模式 (Redis 7.2.5, 6 节点)
#  节点: 7000-7005  总线: 17000-17005
#  redis-cli: redis-cli -c -h localhost -p 7000 -a 123456 cluster nodes
# ================================================================
spring:
  config:
    activate:
      on-profile: cluster
  redis:
    password: 123456
    timeout: 3000ms
    cluster:
      nodes:
        - localhost:7000
        - localhost:7001
        - localhost:7002
        - localhost:7003
        - localhost:7004
        - localhost:7005
      max-redirects: 5
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 2
        max-wait: 3000ms
