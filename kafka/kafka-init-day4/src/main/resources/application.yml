server:
  port: 8080

# ⚠️ %M（方法名）有轻微性能开销，生产环境可考虑移除
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{36}.%M){cyan} %clr(:){faint} %msg%n"

spring:
  kafka:
    bootstrap-servers: 192.168.3.100:9092
    # 生产者配置
    producer:
      # ----- 序列化器 -----
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      # ----- 可靠性配置 -----
      # acks: 0=不等待确认, 1=等待leader确认, all=等待所有ISR副本确认
      # 生产环境推荐 all，确保不丢数据；测试可设1
      acks: all

      # 重试次数，配合幂等性（enable.idempotence）避免乱序
      retries: 10

      # ----- 性能 / 批量配置 -----
      # 每个分区批处理的最大字节数（默认16KB），到达该值就会立即发送
      batch-size: 16384
      # 生产者在发送批次前等待更多消息的时间（毫秒），默认0（立即发送）
      # 适当增大（例如5ms）可提高批量效率，但会增加少量延迟
      linger-ms: 5
      # 生产者缓冲区总内存（默认32MB），用于缓存等待发送的消息
      buffer-memory: 33554432

      # ----- 压缩 -----
      # 可选：none, gzip, snappy, lz4, zstd
      # 推荐 snappy 或 lz4（平衡压缩比和CPU开销）
      compression-type: snappy

      # ----- 其他高级参数 -----
      properties:
        # 请求超时（毫秒），默认30秒
        request.timeout.ms: 30000
        # 最大阻塞时间（当缓冲区满时，send() 方法阻塞的最大时间）
        max.block.ms: 60000
        # 每个连接的最大未确认请求数（默认5），开启幂等时必须 ≤5
        max.in.flight.requests.per.connection: 5
        # 生产者的元数据刷新间隔（毫秒）
        metadata.max.age.ms: 300000
        # 配置拦截器
#        interceptor.classes: com.example.kafka.CustomProducerInterceptor


    # 消费者配置
    consumer:
      # ----- 基础配置 -----
      group-id: order-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # JSON 反序列化器
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      # ----- 偏移量与重启行为 -----
      # 没有初始偏移量或当前偏移量不存在时：earliest=从头消费, latest=从最新开始
      auto-offset-reset: earliest
      # 是否自动提交偏移量（true 简单但可能丢/重，生产推荐 false，手动控制）
      enable-auto-commit: false
      # 自动提交间隔（毫秒），仅当 enable-auto-commit=true 时生效
      auto-commit-interval: 5000

      # ----- 拉取性能配置 -----
      # 单次 poll() 最多返回的记录数，用于控制处理负载
      max-poll-records: 50
      # 最小拉取字节数，默认 1 字节（拉取及时但频繁）；适当增大可提高吞吐（如 1KB）
      fetch-min-bytes: 1024
      # 最大等待时间（毫秒），若未达到 fetch-min-bytes 则等待此时间后返回
      fetch-max-wait-ms: 500
      # 会话超时（毫秒），消费者心跳超时即被认为下线，触发再均衡
      session-timeout-ms: 45000
      # 心跳间隔（毫秒），应为 session-timeout 的 1/3
      heartbeat-interval-ms: 15000
      # poll() 最大间隔，若超过此时间未调用 poll() 则消费者被视为死亡
      max-poll-interval-ms: 300000   # 5分钟，适合处理慢业务

      # ----- JSON 反序列化信任包 -----
      properties:
        spring.json.trusted.packages: "com.example.kafka.dto.*"   # 允许反序列化的包
        spring.json.type.mapping: "order:com.example.kafka.dto.Order"  # 可选：类型映射
    listener:
      ack-mode: manual_immediate
