server:
  port: 8080

spring:
  kafka:
    bootstrap-servers: 192.168.2.102:9092
    # 生产者配置
    producer:
      # ----- 序列化器 -----
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      # ----- 可靠性配置 -----
      # acks: 0=不等待确认, 1=等待leader确认, all=等待所有ISR副本确认
      # 生产环境推荐 all，确保不丢数据；测试可设1
      acks: all

      # 重试次数，配合幂等性（enable.idempotence）避免乱序
      retries: 10

      # ----- 性能 / 批量配置 -----
      # 每个分区批处理的最大字节数（默认16KB），到达该值就会立即发送
      batch-size: 16384
      # 生产者在发送批次前等待更多消息的时间（毫秒），默认0（立即发送）
      # 适当增大（例如5ms）可提高批量效率，但会增加少量延迟
      linger-ms: 5
      # 生产者缓冲区总内存（默认32MB），用于缓存等待发送的消息
      buffer-memory: 33554432

      # ----- 压缩 -----
      # 可选：none, gzip, snappy, lz4, zstd
      # 推荐 snappy 或 lz4（平衡压缩比和CPU开销）
      compression-type: snappy

      # ----- 其他高级参数 -----
      properties:
        # 请求超时（毫秒），默认30秒
        request.timeout.ms: 30000
        # 最大阻塞时间（当缓冲区满时，send() 方法阻塞的最大时间）
        max.block.ms: 60000
        # 每个连接的最大未确认请求数（默认5），开启幂等时必须 ≤5
        max.in.flight.requests.per.connection: 5
        # 生产者的元数据刷新间隔（毫秒）
        metadata.max.age.ms: 300000

    # 消费者配置
    consumer:
      group-id: kafka-demo-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
