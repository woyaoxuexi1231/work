# =========================================================================
# Dubbo Provider（服务提供者）配置 — 全参版
# =========================================================================
# 本文档列出了 application.yml 中 dubbo.* 下所有常用配置参数，
# 每个参数附带：作用说明 + 适用场景 + 优先级规则（端间冲突时谁说了算）。
#
# 优先级规则（从高到低）：
#   ① 方法级 @DubboService(method={...}) / @DubboReference(method={...})
#   ② 接口级 @DubboService / @DubboReference 上的参数
#   ③ 全局 dubbo.provider / dubbo.consumer 配置
#   ④ dubbo.protocol / dubbo.registry 等底层配置
#
# ❗ Provider 端和 Consumer 端都有同名的参数（如 timeout、retries），
#    冲突时  Consumer 端的值优先，因为 Consumer 是发起方，
#    Provider 端的值作为"服务端约束上限"。
#    详细规则见每个参数的"端间冲突"说明。

# ==================== Spring Boot 基础 ====================
spring:
  application:
    name: dubbo-demo-provider

# ==================== Dubbo 配置全表 ====================
dubbo:

  # ---------- 服务扫描 ----------
  scan:
    # 扫描哪些包下的 @DubboService 注解
    base-packages: com.example.dubbo.demo.provider.service.impl

  # ---------- 应用信息 ----------
  application:
    # 【必填】应用名 — 注册到 Nacos 时作为服务标识的一部分
    name: dubbo-demo-provider
    # 应用负责人 — 仅用于监控和运维展示
    owner: demo-team
    # 应用所属组织
    organization: example
    # 环境标识（dev / test / prod），用于环境隔离
    environment: dev
    # 应用版本号 — 用于灰度发布时的版本匹配
    version: "1.0.0"
    # 是否启用 QoS（在线运维命令 Telnet 端口）
    qos-enable: true
    # QoS 监听端口
    qos-port: 22222
    # 是否允许外部机器执行 QoS 命令（false=仅本机）
    qos-accept-foreign-ip: false

  # ---------- 模块信息 ----------
  module:
    name: provider-module
    version: "1.0.0"

  # ---------- 注册中心 ----------
  registry:
    # 【必填】注册中心地址
    # 格式: nacos://ip:port?username=xxx&password=xxx
    #        zookeeper://ip:port
    address: "nacos://192.168.3.100:8848?username=nacos&password=nacos"

    # 注册中心协议（nacos / zookeeper / consul / etcd / redis / sofa）
    # ❗ 注意：通常由 address 前缀自动推断，无需单独设置
    # protocol: nacos

    # 注册中心超时（毫秒）— 连接注册中心的超时时间
    # 适用场景：网络不稳定时调大，避免频繁重连
    timeout: 10000

    # 启动时是否检查注册中心可用
    # true:  启动时连接不上注册中心则抛异常、启动失败（推荐生产）
    # false: 启动时跳过检查，后续异步重连（适合本地开发）
    # ❗ 端间冲突 N/A（只有 Provider 需要注册）
    check: false

    # 注册中心用户名/密码（用于 Nacos 认证）
    # 也可以放在 address 的 query string 中: ?username=nacos&password=nacos
    # username: nacos
    # password: nacos

    # 端口 — 通常由 address 推断，无需显式设置
    # port: 8848

    # 注册分组 — Nacos 的命名空间 ID（用于多环境隔离）
    # group: DEFAULT_GROUP

    # 是否注册服务到注册中心（true=注册，false=只订阅不从这注册）
    # 适用场景：纯 Consumer 节点设为 false
    register: true

    # 是否从注册中心订阅服务（true=订阅，false=不订阅走直连）
    # 适用场景：直连模式 (subscribe=false + 手动指定 provider 地址)
    subscribe: true

    # 注册中心是否优先使用文件缓存
    # 适用场景：注册中心不可用时，从本地缓存文件恢复地址列表
    file-cache: true

    # 注册简化（用于应用级服务发现，Dubbo 3.x 特性）
    # simplified: true

    # 是否使用作为配置中心（Nacos 可同时当配置中心用）
    # use-as-config-center: true

    # 是否使用作为元数据中心
    # use-as-metadata-center: true

  # ---------- 元数据中心 ----------
  metadata-report:
    # 元数据上报地址（通常与注册中心相同）
    address: "nacos://192.168.3.100:8848?username=nacos&password=nacos"
    # 元数据上报模式
    # 适用场景：应用级服务发现时需要上报接口/方法签名
    # report-definition: true

  # ---------- 协议 ----------
  protocol:
    # 【必填】协议名称
    # dubbo  = 默认协议，TCP 长连接 + Hessian2 序列化（Java ↔ Java 推荐）
    # tri    = Triple 协议，HTTP/2，兼容 gRPC（跨语言推荐）
    # rest   = RESTful HTTP 协议
    # hessian = Hessian HTTP 协议
    # thrift = Apache Thrift 协议
    # grpc  = gRPC 协议
    name: dubbo

    # 【必填】监听端口
    # -1 = 自动分配，0 = 随机
    # 适用场景：同一机器多实例用 -1 避免冲突
    port: 20880

    # 服务端主机名/IP（注册到注册中心的 IP）
    # 适用场景：有多网卡的服务器需指定外网 IP
    # host: 192.168.1.100

    # 上下文路径（URL 路径前缀）
    # contextpath: /dubbo

    # 线程池类型
    # fixed   = 固定大小线程池（推荐，防止资源被打满）
    # cached  = 缓存线程池（空闲 60s 回收）
    # limited = 可伸缩但有限制的线程池
    # eager   = 创建新线程直到 max，超过才入队
    threadpool: fixed

    # 核心线程数（threadpool=fixed 时生效）
    # 适用场景：高并发服务调大，I/O 密集型服务建议 200+
    threads: 200

    # 最大线程数（threadpool=cached/limited/eager 时生效）
    # iothreads: 100

    # IO 线程池大小（用于处理网络 I/O 事件）
    # 适用场景：Netty 的 EventLoop 线程数，通常 CPU 核数 * 2
    # iothreads: 16

    # 最大请求体大小（字节，默认 8MB）
    # 适用场景：传输大对象（如文件、图片）时调大
    # payload: 8388608

    # Buffer 大小
    # buffer: 8192

    # 心跳间隔（毫秒）— 保持 TCP 长连接
    # 适用场景：网络设备会自动断开空闲连接时设置
    heartbeat: 60000

    # 是否使用长连接
    # true  = 长连接（dubbo 协议默认，减少握手开销）
    # false = 短连接（每次调用建连）— 仅 hessian/http 等协议
    # keep-alive: true

    # 是否启用 Netty Native Transport（epoll/kqueue）
    # 适用场景：Linux 环境下启用 epoll 可获得更好性能
    # prefer-native: true

    # 编码器/解码器
    # serialization: hessian2

    # 是否启用延迟连接（Provider 端延迟暴露）
    # 适用场景：Spring 容器初始化完再暴露服务
    # delay: -1

    # 是否启用 Telnet 端口
    # telnet: ls,status,shutdown

  # ---------- 提供者默认配置 ----------
  provider:
    # ===== 调用控制 =====

    # 服务调用超时（毫秒）— 等待 Provider 响应的最长时间
    # ❗ 端间冲突：Consumer 端 timeout 覆盖此值
    #    即：Consumer 设 1000 → 用 1000；Consumer 不设 → 用此值
    # 适用场景：业务接口平均耗时 x2，数据库查询慢则调大
    timeout: 3000

    # 失败重试次数（不含第 1 次调用）
    # ❗ 端间冲突：Consumer 端 retries 覆盖此值
    # 适用场景：幂等接口（读操作）可设大；写操作（下单扣库存）最好设 0
    #   retries=2 → 第 1 次失败，重试第 2、3 次，总共 3 次
    retries: 2

    # 最大并发调用数（0=不限制）
    # 适用场景：限流，防止 slow client 耗尽服务端线程
    # ❗ 端间冲突：Consumer 端 actives < Provider 端 executes 时，两者取严格模式
    # active-limit: 100

    # 负载均衡策略
    # random        = 随机 + 权重（默认，均匀分布）
    # roundrobin    = 轮询 + 权重（请求数均分）
    # leastactive   = 最少活跃调用数（慢的 Provider 少接请求）
    # consistenthash = 一致性哈希（同参数 → 同 Provider，利于缓存）
    # ❗ 端间冲突：Consumer 端 loadbalance 覆盖此值
    # 适用场景：random 通用；consistenthash 用于缓存类服务
    # loadbalance: random

    # 集群容错策略
    # failover  = 失败转移（重试其他 Provider，默认）
    # failfast  = 快速失败（抛异常，不适合重试的写操作）
    # failsafe  = 安全失败（吞异常，适合日志审计等）
    # failback  = 失败自动恢复（后台定时重发）
    # forking   = 并行调用多个（1 个成功就返回，注意资源消耗）
    # broadcast = 广播所有，任一失败即报错
    # available = 只调可用那个
    # ❗ 端间冲突：Consumer 端 cluster 覆盖此值
    cluster: failover

    # ===== 连接控制 =====

    # 每个 Consumer 与 Provider 之间建立的连接数
    # 适用场景：dubbo 协议默认长连接，Connections=1 已足够
    connections: 1

    # 服务端最大可接受连接数
    # 适用场景：保护 Provider，防止过多 Consumer 连入打垮服务端
    # accepts: 1000

    # ===== 线程/派发 =====

    # 派发策略
    # all        = 所有消息到线程池（默认，最安全）
    # direct     = IO 线程直接处理（最快但危险，阻塞 IO 会卡住）
    # message    = 请求和响应到线程池，连接事件 IO 处理
    # execution  = 只有请求到线程池，响应 IO 处理
    # connection = 连接事件 IO 处理
    # 适用场景：追求极致性能时用 execution；业务复杂时用 all
    dispatcher: all

    # ===== 启动控制 =====

    # 延迟暴露（毫秒）
    # -1 = Spring 容器初始化完毕后再暴露服务（推荐）
    #  0 = 立即暴露（在 Bean 初始化时）
    #  >0 = 延迟 N 毫秒后暴露
    # 适用场景：wait 依赖资源（如数据库连接池）的初始化
    delay: -1

    # 是否使用 Spring 事件通知
    # event-listener: false

    # ===== 权重/Stub/Mock =====

    # 负载均衡权重（1~1000）
    # 适用场景：机器配置不同，高配机器权重调大
    weight: 100

    # 本地存根 — 在 Consumer 端执行的本地代理类名（需实现接口）
    # 适用场景：参数校验、本地缓存、失败降级
    # stub: com.example.dubbo.demo.provider.stub.UserServiceStub

    # 服务降级 Mock 类名
    # 适用场景：Provider 不可用时返回默认值，不抛出异常
    # mock: com.example.dubbo.demo.provider.mock.UserServiceMock

    # ===== 过滤器 =====

    # 自定义 Filter 列表（逗号分隔，- 前缀表示排除默认 Filter）
    # filter: "-exception"

    # 监听器
    # listener: "spring"

    # ===== 序列化/编解码 =====

    # 序列化方式
    # hessian2 = 默认，安全且跨语言（推荐）
    # kryo     = 性能最好，但需注册类（非跨语言）
    # fastjson = JSON 格式，可读性好但性能一般
    # protobuf = 最省流量，需定义 .proto 文件
    # fst      = 类似 Kryo，性能高
    # java     = JDK 原生序列化（慢，不推荐）
    serialization: hessian2

    # ===== 优化与调优 =====

    # 结果缓存
    # lru         = LRU 缓存（最近最少使用淘汰）
    # threadlocal = 线程本地缓存
    # jcache      = JCache 标准实现
    # cache: lru

    # 参数验证（依赖 javax.validation / jakarta.validation）
    # true = 开启，需要实体类上加 @NotNull、@Min 等注解
    # validation: true

    # 令牌验证 — 访问 Provider 时需携带 token
    # true       = 随机生成 token
    # "123abc"   = 固定 token
    # false/null = 不开启
    # 适用场景：防止未授权的 Consumer 调用
    # token: true

    # 存取日志
    # accesslog: true

    # 是否动态将 Provider 注册到注册中心
    # dynamic: true

  # ---------- 协议默认值 ----------
  # Provider 端的 protocol 默认值，会被 dubbo.protocol.xxx 覆盖
  # 一般不需要单独配置

# ==================== 日志配置 ====================
logging:
  level:
    com.example.dubbo.demo: DEBUG
    # 开启 Dubbo 注册中心的调试日志，便于排查注册/订阅问题
    org.apache.dubbo: INFO
