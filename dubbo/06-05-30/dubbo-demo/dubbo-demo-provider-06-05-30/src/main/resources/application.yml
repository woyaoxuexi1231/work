spring:
  application:
    name: dubbo-demo-provider

dubbo:
  application:
    name: dubbo-demo-provider
  registry:
    # ════════════════════════════════════════════════════════
    # 注册中心（切换时注释/取消注释对应行即可）
    # ════════════════════════════════════════════════════════
    # Zookeeper（当前默认）
#    address: "zookeeper://192.168.3.100:2181"
    # Nacos（取消下面这行，注释上面那行）
    address: "nacos://192.168.3.100:8848?username=nacos&password=nacos"
    check: false
    timeout: 60000
  protocol:
    name: dubbo
    port: 20880

logging:
  level:
    org.apache.curator: DEBUG