<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI 成片生成 - MLM</title>
    <th:block th:replace="~{fragments :: head}"></th:block>
    <style>
        .scene-card { transition: all 0.2s; }
        .scene-card:hover { transform: translateY(-2px); }
        .scene-card.generated { border-color: rgba(34,197,94,0.3); }
        .img-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <th:block th:replace="~{fragments :: nav}"></th:block>
    <main class="p-6">
        <!-- 头部 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <a href="/projects/[[${projectId}]]" class="text-gray-400 hover:text-white text-sm">← 返回项目详情</a>
                <h1 class="text-2xl font-bold text-white mt-1">AI 成片工作台</h1>
                <p class="text-gray-400 text-sm mt-1" id="episodeInfo">加载中...</p>
            </div>
            <div class="flex gap-2">
                <span id="statusBadge" class="status-badge status-generating">AI 成片</span>
            </div>
        </div>

        <!-- Pipeline 步骤指示 -->
        <div class="glass p-4 mb-6 flex items-center gap-2">
            <div class="flex items-center gap-1 text-xs text-gray-500">
                <span class="step-dot done"></span> 📝 剧本
            </div>
            <div class="w-8 h-0.5 bg-green-500"></div>
            <div class="flex items-center gap-1 text-xs text-gray-500">
                <span class="step-dot done"></span> 🔍 审核
            </div>
            <div class="w-8 h-0.5 bg-green-500"></div>
            <div class="flex items-center gap-1 text-xs text-gray-500">
                <span class="step-dot done"></span> 🎬 分镜
            </div>
            <div class="w-8 h-0.5 bg-indigo-500 animate-pulse"></div>
            <div class="flex items-center gap-1 text-xs text-white">
                <span class="step-dot active"></span> 🤖 生成中
            </div>
            <div class="w-8 h-0.5 bg-white/10"></div>
            <div class="flex items-center gap-1 text-xs text-gray-500">
                <span class="step-dot pending"></span> ✅ 终审
            </div>
        </div>

        <!-- 分镜场景列表 -->
        <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-bold text-white">📋 分镜场景</h2>
            <span id="progress" class="text-sm text-gray-400">0/0 已生成</span>
        </div>
        <div id="sceneList" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="col-span-full text-center text-gray-500 py-8">加载分镜数据...</div>
        </div>

        <!-- 底部操作区 -->
        <div class="glass p-4 flex items-center justify-between">
            <div class="text-sm text-gray-400">
                <span>所有图片生成完毕后可生成视频</span>
            </div>
            <div class="flex gap-3">
                <button id="generateVideoBtn" onclick="generateVideo()" class="btn-glass text-white px-4 py-2 rounded-lg hidden">
                    🎬 生成视频
                </button>
                <button id="submitReviewBtn" onclick="submitForReview()" class="btn-success text-white px-4 py-2 rounded-lg hidden">
                    ✅ 提交终审
                </button>
            </div>
        </div>
    </main>

    <script>
        const PROJECT_ID = [[${projectId}]];
        const EPISODE_ID = [[${episodeId}]];
        const SCENES = [
            { label: '开场全景', desc: '清晨校园，樱花飘落，主角走向校门', img: null, video: null },
            { label: '角色特写', desc: '主角抬头看向天空，面带微笑', img: null, video: null },
            { label: '动作场景', desc: '主角在操场上奔跑，镜头跟随', img: null, video: null },
            { label: '结尾定格', desc: '夕阳下，主角与朋友道别', img: null, video: null }
        ];
        let generatedCount = 0;

        function renderScenes() {
            const el = document.getElementById('sceneList');
            el.innerHTML = SCENES.map((s, i) => `
                <div class="glass p-4 scene-card ${s.img ? 'generated' : ''}" id="scene-${i}">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-white font-medium">${s.label}</h3>
                        <span class="text-xs text-gray-500">场景 ${i + 1}/${SCENES.length}</span>
                    </div>
                    <p class="text-xs text-gray-400 mb-3">${s.desc}</p>
                    <div class="mb-3">
                        ${s.img
                            ? `<img src="${s.img}" class="img-preview"/>`
                            : `<div class="img-preview flex items-center justify-center text-gray-500 text-sm">尚未生成</div>`
                        }
                    </div>
                    <div class="flex gap-2">
                        ${!s.img
                            ? `<button onclick="generateImage(${i})" class="btn-glass text-white px-3 py-1.5 rounded text-xs flex-1">🖼 生成图片</button>`
                            : `<button onclick="generateImage(${i})" class="btn-glass text-white px-3 py-1.5 rounded text-xs flex-1">🔄 重新生成</button>`
                        }
                    </div>
                </div>
            `).join('');
            updateProgress();
        }

        async function generateImage(sceneIndex) {
            const btn = document.querySelector(`#scene-${sceneIndex} button`);
            btn.textContent = '⏳ 生成中...';
            btn.disabled = true;

            try {
                await fetch('/api/projects/episode/generate-image', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({projectId: PROJECT_ID, episodeId: EPISODE_ID, prompt: SCENES[sceneIndex].label})
                });
                // Mock: 2-5分钟后轮询到结果后自动显示
                SCENES[sceneIndex].img = 'https://picsum.photos/seed/' + EPISODE_ID + '-' + sceneIndex + '/960/540';
                btn.textContent = '⏳ 等待 AI... (2-5分钟)';
                btn.disabled = true;

                // 模拟延迟后显示结果
                const delay = 2000 + Math.random() * 3000;
                setTimeout(() => {
                    SCENES[sceneIndex].img = 'https://picsum.photos/seed/' + EPISODE_ID + '-' + sceneIndex + '-' + Date.now() + '/960/540';
                    generatedCount++;
                    renderScenes();
                    checkAllGenerated();
                }, delay);
            } catch (e) {
                btn.textContent = '🖼 生成图片';
                btn.disabled = false;
            }
        }

        function checkAllGenerated() {
            const allDone = SCENES.every(s => s.img);
            document.getElementById('generateVideoBtn').classList.toggle('hidden', !allDone);
            if (allDone) {
                document.getElementById('generateVideoBtn').textContent = '🎬 生成视频';
            }
        }

        async function generateVideo() {
            const btn = document.getElementById('generateVideoBtn');
            btn.textContent = '⏳ 视频生成中...';
            btn.disabled = true;

            try {
                await fetch('/api/projects/episode/generate-video', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({projectId: PROJECT_ID, episodeId: EPISODE_ID})
                });
                // 模拟延迟
                setTimeout(() => {
                    btn.textContent = '✅ 视频已生成';
                    document.getElementById('submitReviewBtn').classList.remove('hidden');
                }, 3000);
            } catch (e) {
                btn.textContent = '🎬 生成视频';
                btn.disabled = false;
            }
        }

        async function submitForReview() {
            const btn = document.getElementById('submitReviewBtn');
            btn.textContent = '⏳ 提交中...';
            btn.disabled = true;

            try {
                await fetch('/api/projects/episode/complete-generation', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({projectId: PROJECT_ID, episodeId: EPISODE_ID})
                });
                btn.textContent = '✅ 已提交终审';
                setTimeout(() => {
                    window.location.href = `/projects/${PROJECT_ID}`;
                }, 1500);
            } catch (e) {
                btn.textContent = '✅ 提交终审';
                btn.disabled = false;
            }
        }

        function updateProgress() {
            const done = SCENES.filter(s => s.img).length;
            document.getElementById('progress').textContent = `${done}/${SCENES.length} 已生成`;
        }

        // 加载剧集信息
        async function loadEpisode() {
            try {
                const res = await fetch('/api/projects/get', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id: PROJECT_ID})});
                const data = await res.json();
                const project = data.data?.project || {};
                const episodes = data.data?.episodes || [];
                const ep = episodes.find(e => e.id === EPISODE_ID);
                if (ep) {
                    document.getElementById('episodeInfo').textContent =
                        `${project.name} · 第 ${ep.episodeNumber} 集 ${ep.title || ''}`;
                }
            } catch (e) {}
        }

        loadEpisode();
        renderScenes();
    </script>
</body>
</html>
