<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录 - MLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%); min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(16px); border-radius: 16px; }
    </style>
</head>
<body class="flex items-center justify-center">
    <div class="glass p-8 w-96 mt-32">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">🎬</div>
            <h1 class="text-2xl font-bold text-white">MLM 动漫平台</h1>
            <p class="text-gray-400 text-sm mt-1">登录后开始创作</p>
        </div>
        <form action="/login" method="POST">
            <input name="username" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white mb-3" placeholder="用户名" required autofocus>
            <input name="password" type="password" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white mb-4" placeholder="密码" required>
            <div id="errorMsg" class="text-red-400 text-sm mb-3 hidden">用户名或密码错误</div>
            <button type="submit" class="w-full btn-glass text-white py-2 rounded-lg font-medium">登 录</button>
        </form>
        <div class="text-center text-gray-500 text-xs mt-4">
            演示账号: demo / 123456 ｜ admin / 123456
        </div>
    </div>

    <script>
        if (window.location.search.includes('error=1')) {
            document.getElementById('errorMsg').classList.remove('hidden');
        }
    </script>
</body>
</html>
