<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="head">
        <meta charset="UTF-8">
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            :root {
                --glass-bg: rgba(255, 255, 255, 0.06);
                --glass-border: rgba(255, 255, 255, 0.1);
                --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            }
            body {
                background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
                min-height: 100vh;
                color: #e0e0e0;
            }
            .glass {
                background: var(--glass-bg);
                border: 1px solid var(--glass-border);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-radius: 16px;
                box-shadow: var(--glass-shadow);
            }
            .glass-hover:hover {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.2);
            }
            .btn-glass {
                background: rgba(99, 102, 241, 0.2);
                border: 1px solid rgba(99, 102, 241, 0.3);
                backdrop-filter: blur(8px);
                transition: all 0.2s;
            }
            .btn-glass:hover {
                background: rgba(99, 102, 241, 0.35);
                border-color: rgba(99, 102, 241, 0.5);
            }
            .btn-danger {
                background: rgba(239, 68, 68, 0.2);
                border: 1px solid rgba(239, 68, 68, 0.3);
            }
            .btn-danger:hover {
                background: rgba(239, 68, 68, 0.35);
                border-color: rgba(239, 68, 68, 0.5);
            }
            .btn-success {
                background: rgba(34, 197, 94, 0.2);
                border: 1px solid rgba(34, 197, 94, 0.3);
            }
            .btn-success:hover {
                background: rgba(34, 197, 94, 0.35);
                border-color: rgba(34, 197, 94, 0.5);
            }
            .status-badge {
                display: inline-block;
                padding: 2px 10px;
                border-radius: 20px;
                font-size: 0.75rem;
                font-weight: 600;
            }
            .status-draft { background: rgba(148, 163, 184, 0.3); color: #cbd5e1; }
            .status-review { background: rgba(250, 204, 21, 0.3); color: #fde047; }
            .status-storyboard { background: rgba(99, 102, 241, 0.3); color: #a5b4fc; }
            .status-generating { background: rgba(168, 85, 247, 0.3); color: #c4b5fd; }
            .status-approval { background: rgba(251, 146, 60, 0.3); color: #fdba74; }
            .status-completed { background: rgba(34, 197, 94, 0.3); color: #86efac; }
            .status-failed { background: rgba(239, 68, 68, 0.3); color: #fca5a5; }
        </style>
    </th:block>
</head>
<body>
    <nav th:fragment="nav" class="glass mx-4 mt-4 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🎬</span>
            <a href="/" class="text-xl font-bold text-white">MLM 动漫平台</a>
        </div>
        <div class="flex gap-6 text-sm items-center">
            <a href="/" class="text-gray-300 hover:text-white transition">仪表盘</a>
            <a href="/projects" class="text-gray-300 hover:text-white transition">项目列表</a>
            <a href="/resources" class="text-gray-300 hover:text-white transition">资源库</a>
            <a href="/models" class="text-gray-300 hover:text-white transition">模型配置</a>
            <!-- 消息铃铛 -->
            <div class="relative">
                <button onclick="toggleNotifications()" class="text-gray-300 hover:text-white transition text-xl relative">
                    🔔
                    <span id="notifBadge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </button>
                <!-- 下拉面板 -->
                <div id="notifPanel" class="hidden absolute right-0 top-8 w-80 glass p-3 max-h-96 overflow-y-auto z-50" style="backdrop-filter: blur(20px);">
                    <div class="text-sm font-bold text-white mb-2">审核消息</div>
                    <div id="notifList">
                        <div class="text-xs text-gray-500 py-2">暂无未读消息</div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // ========== 审核消息铃铛 ==========
            let notifVisible = false;

            async function loadNotifications() {
                try {
                    const res = await fetch('/api/notifications/count');
                    const data = await res.json();
                    const count = data.data?.count || 0;
                    const badge = document.getElementById('notifBadge');
                    if (count > 0) {
                        badge.textContent = count > 99 ? '99+' : count;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                } catch (e) {}
            }

            async function toggleNotifications() {
                const panel = document.getElementById('notifPanel');
                notifVisible = !notifVisible;
                panel.classList.toggle('hidden', !notifVisible);

                if (notifVisible) {
                    try {
                        const res = await fetch('/api/notifications');
                        const data = await res.json();
                        const msgs = data.data || [];
                        const list = document.getElementById('notifList');
                        if (msgs.length === 0) {
                            list.innerHTML = '<div class="text-xs text-gray-500 py-2">暂无未读消息</div>';
                        } else {
                            list.innerHTML = msgs.map(m => `
                                <div class="border-b border-white/5 last:border-0 py-2" onclick="markRead(${m.id})">
                                    <div class="text-sm text-white">${m.title}</div>
                                    <div class="text-xs text-gray-400 truncate">${m.content || ''}</div>
                                    <div class="text-[10px] text-gray-500 mt-1">${m.createdAt ? m.createdAt.substring(0,16) : ''}</div>
                                </div>
                            `).join('');
                        }
                    } catch (e) {}
                }
            }

            async function markRead(id) {
                await fetch('/api/notifications/read', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify([id])
                });
                loadNotifications();
                const panel = document.getElementById('notifPanel');
                if (!panel.classList.contains('hidden')) {
                    toggleNotifications();
                    toggleNotifications();
                }
            }

            document.addEventListener('click', function(e) {
                const panel = document.getElementById('notifPanel');
                if (notifVisible && !e.target.closest('.relative')) {
                    panel.classList.add('hidden');
                    notifVisible = false;
                }
            });

            loadNotifications();
            setInterval(loadNotifications, 30000);
        </script>
    </nav>
</body>
</html>
