<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>资源库 - MLM</title>
    <th:block th:replace="~{fragments :: head}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments :: nav}"></th:block>
    <main class="p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-white">资源库</h1>
            <button onclick="document.getElementById('uploadModal').classList.remove('hidden')" class="btn-glass text-white px-4 py-2 rounded-lg font-medium">
                + 上传资源
            </button>
        </div>

        <!-- 资源列表 -->
        <div class="grid grid-cols-4 gap-4" id="resourceGrid">
            <div class="col-span-4 text-center text-gray-500 py-8">加载中...</div>
        </div>

        <!-- 上传弹窗 -->
        <div id="uploadModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="glass p-6 w-96">
                <h2 class="text-xl font-bold text-white mb-4">上传资源</h2>
                <input id="resName" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white mb-3" placeholder="资源名称">
                <select id="resType" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white mb-3">
                    <option value="IMAGE">图片</option>
                    <option value="VIDEO">视频</option>
                    <option value="AUDIO">音频</option>
                    <option value="TEXT">文本</option>
                </select>
                <input type="file" id="resFile" class="w-full text-gray-400 mb-4">
                <div class="flex gap-3 justify-end">
                    <button onclick="document.getElementById('uploadModal').classList.add('hidden')" class="px-4 py-2 text-gray-400">取消</button>
                    <button onclick="upload()" class="btn-glass text-white px-4 py-2 rounded-lg">上传</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadResources() {
            const res = await fetch('/api/resources');
            const data = await res.json();
            const resources = data.data || [];
            const grid = document.getElementById('resourceGrid');

            if (resources.length === 0) {
                grid.innerHTML = '<div class="col-span-4 text-center text-gray-500 py-8">暂无资源，点击上传</div>';
                return;
            }

            grid.innerHTML = resources.map(r => `
                <div class="glass glass-hover p-4 transition">
                    <div class="text-4xl mb-2">${r.type === 'IMAGE' ? '🖼️' : r.type === 'VIDEO' ? '🎥' : r.type === 'AUDIO' ? '🎵' : '📄'}</div>
                    <div class="font-medium text-sm truncate">${r.name}</div>
                    <div class="text-xs text-gray-400 mt-1">${r.type} | ${(r.fileSize / 1024).toFixed(1)}KB</div>
                    <div class="text-xs text-gray-500 mt-1 truncate">${r.ossUrl || ''}</div>
                </div>
            `).join('');
        }

        async function upload() {
            const name = document.getElementById('resName').value.trim();
            const type = document.getElementById('resType').value;
            const file = document.getElementById('resFile').files[0];
            if (!name || !file) return alert('请填写完整信息');

            const form = new FormData();
            form.append('file', file);
            form.append('name', name);
            form.append('type', type);

            await fetch('/api/resources/upload', {method:'POST', body: form});
            document.getElementById('uploadModal').classList.add('hidden');
            document.getElementById('resName').value = '';
            document.getElementById('resFile').value = '';
            loadResources();
        }

        loadResources();
    </script>
</body>
</html>
