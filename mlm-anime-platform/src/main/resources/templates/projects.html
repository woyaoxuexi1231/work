<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>项目列表 - MLM</title>
    <th:block th:replace="~{fragments :: head}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments :: nav}"></th:block>
    <main class="p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-white">项目列表</h1>
            <button onclick="showCreateModal()" class="btn-glass text-white px-4 py-2 rounded-lg font-medium">
                + 新建项目
            </button>
        </div>
        <div id="projectList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="col-span-full text-center text-gray-500 py-8">加载中...</div>
        </div>

        <!-- 新建项目弹窗（含阶段负责人） -->
        <div id="createModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="glass p-6 w-[700px] max-w-[95vw] max-h-[90vh] overflow-y-auto">
                <h2 class="text-xl font-bold text-white mb-4">新建项目</h2>

                <div class="mb-4">
                    <label class="text-gray-400 text-sm block mb-1">项目名称</label>
                    <input id="projectName" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white" placeholder="输入项目名称">
                </div>

                <div class="flex items-center gap-2 mb-4">
                    <input type="checkbox" id="useResource" onchange="document.getElementById('resourcePicker').classList.toggle('hidden')" class="accent-indigo-500">
                    <label for="useResource" class="text-gray-400 text-sm">引用资源库素材</label>
                </div>
                <div id="resourcePicker" class="hidden mb-4">
                    <select id="resourceId" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white"><option value="">选择资源...</option></select>
                </div>

                <div class="border-t border-white/10 pt-4 mb-4">
                    <h3 class="text-white font-medium mb-3">阶段负责人（多选）</h3>
                    <p class="text-xs text-gray-500 mb-3">每个阶段可指定一个或多个负责人，留空则仅创建者可操作</p>
                    <div id="stageMembersContainer" class="space-y-3"></div>
                </div>

                <div class="flex gap-3 justify-end">
                    <button onclick="hideCreateModal()" class="px-4 py-2 text-gray-400">取消</button>
                    <button onclick="createProject()" class="btn-glass text-white px-4 py-2 rounded-lg">创建项目</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const STAGES = [
            { code: 2, name: '剧本创作' },
            { code: 3, name: '剧本审核' },
            { code: 4, name: '拆分镜' },
            { code: 5, name: 'AI成片' },
            { code: 6, name: '终审' }
        ];
        let allUsers = [];

        async function loadProjects() {
            const res = await fetch('/api/projects');
            const data = await res.json();
            const projects = data.data || [];
            const el = document.getElementById('projectList');
            if (projects.length === 0) {
                el.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">暂无项目，点击右上角新建</div>';
                return;
            }
            el.innerHTML = projects.map(p => `
                <a href="/projects/${p.id}" class="glass p-5 glass-hover block no-underline">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-lg font-bold text-white">${p.name}</h3>
                        <span class="text-xs text-gray-500">#${p.id}</span>
                    </div>
                    <div class="text-sm text-gray-400">
                        <span>📺 ${p.episodesCount || 0} 集</span>
                        <span class="ml-3">✅ ${p.completedCount || 0} 集完成</span>
                        <span class="ml-3">${p.isPublic ? '🌍 公开' : '🔒 私有'}</span>
                    </div>
                </a>
            `).join('');
        }

        async function showCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
            await Promise.all([loadResources(), loadUsers()]);
            renderStageMembers();
        }
        function hideCreateModal() { document.getElementById('createModal').classList.add('hidden'); }

        async function loadResources() {
            try {
                const res = await fetch('/api/resources');
                const data = await res.json();
                const select = document.getElementById('resourceId');
                select.innerHTML = '<option value="">选择资源...</option>';
                (data.data || []).forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.id; opt.textContent = r.name + ' (' + r.type + ')';
                    select.appendChild(opt);
                });
            } catch (e) {}
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                allUsers = data.data || [];
            } catch (e) {}
        }

        function renderStageMembers() {
            const container = document.getElementById('stageMembersContainer');
            container.innerHTML = STAGES.map(s => `
                <div class="flex items-start gap-3 p-3 bg-white/5 rounded-lg">
                    <div class="text-sm text-white font-medium w-20 shrink-0 pt-1">${s.name}</div>
                    <div class="flex flex-wrap gap-2" id="stage-${s.code}">
                        ${allUsers.map(u => `
                            <div class="flex items-center gap-1.5 px-3 py-1.5 bg-white/5 rounded-md cursor-pointer hover:bg-white/10 text-sm text-gray-300 user-chip" data-user="${u.id}" onclick="toggleChip(this)">
                                👤 ${u.username}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleChip(el) {
            el.classList.toggle('selected');
            el.classList.toggle('bg-indigo-500/20');
            el.classList.toggle('bg-white/5');
        }

        async function createProject() {
            const name = document.getElementById('projectName').value.trim();
            if (!name) return alert('请输入项目名称');
            const resourceId = document.getElementById('useResource').checked ? document.getElementById('resourceId').value : '';

            // 收集各阶段负责人（选中的 chip 有 selected 类）
            const members = [];
            STAGES.forEach(s => {
                document.querySelectorAll(`#stage-${s.code} .user-chip.selected`).forEach(chip => {
                    members.push({ stage: s.code, userId: parseInt(chip.dataset.user) });
                });
            });

            // 1. 创建项目
            let url = `/api/projects?name=${encodeURIComponent(name)}`;
            if (resourceId) url += `&resourceId=${resourceId}`;
            const res = await fetch(url, { method: 'POST' });
            const data = await res.json();
            const projectId = data.data?.id;
            if (!projectId) return alert('创建失败');

            // 2. 设置阶段负责人(如果有)
            if (members.length > 0) {
                await fetch(`/api/projects/${projectId}/stage-members`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(members)
                });
            }

            hideCreateModal();
            document.getElementById('projectName').value = '';
            loadProjects();
            window.location.href = `/projects/${projectId}`;
        }

        loadProjects();
    </script>
</body>
</html>
