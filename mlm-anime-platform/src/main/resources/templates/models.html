<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>模型配置 - MLM</title>
    <th:block th:replace="~{fragments :: head}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments :: nav}"></th:block>
    <main class="p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-white">模型配置</h1>
            <button onclick="document.getElementById('configModal').classList.remove('hidden')" class="btn-glass text-white px-4 py-2 rounded-lg font-medium">
                + 新增配置
            </button>
        </div>

        <!-- 配置列表 -->
        <div class="glass p-5">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-gray-400 border-b border-white/10">
                        <th class="text-left py-2">厂商</th>
                        <th class="text-left py-2">模型类型</th>
                        <th class="text-left py-2">API Endpoint</th>
                        <th class="text-left py-2">轮询间隔(s)</th>
                        <th class="text-left py-2">最大轮询次数</th>
                        <th class="text-left py-2">重试次数</th>
                        <th class="text-left py-2">状态</th>
                    </tr>
                </thead>
                <tbody id="configBody">
                    <tr><td colspan="7" class="py-4 text-center text-gray-500">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 新增弹窗 -->
        <div id="configModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="glass p-6 w-96">
                <h2 class="text-xl font-bold text-white mb-4">新增模型配置</h2>
                <input id="vendor" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white mb-3" placeholder="厂商 (openai/sd/kling)">
                <select id="modelType" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white mb-3">
                    <option value="TEXT_TO_TEXT">文生文</option>
                    <option value="TEXT_TO_IMAGE">文生图</option>
                    <option value="IMAGE_TO_VIDEO">图生视频</option>
                </select>
                <input id="endpoint" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white mb-3" placeholder="API Endpoint">
                <input id="apiKey" class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white mb-3" placeholder="API Key">
                <div class="flex gap-3 mb-3">
                    <input id="pollInterval" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white" placeholder="轮询间隔(s)" value="30">
                    <input id="maxPoll" class="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white" placeholder="最大轮询" value="60">
                </div>
                <div class="flex gap-3 justify-end">
                    <button onclick="document.getElementById('configModal').classList.add('hidden')" class="px-4 py-2 text-gray-400">取消</button>
                    <button onclick="addConfig()" class="btn-glass text-white px-4 py-2 rounded-lg">保存</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const TYPE_LABELS = {'TEXT_TO_TEXT':'文生文','TEXT_TO_IMAGE':'文生图','IMAGE_TO_VIDEO':'图生视频'};

        async function loadConfigs() {
            const res = await fetch('/api/models/configs');
            const data = await res.json();
            const configs = data.data || [];
            const tbody = document.getElementById('configBody');
            if (configs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="py-4 text-center text-gray-500">暂无配置，请添加</td></tr>';
                return;
            }
            tbody.innerHTML = configs.map(c => `
                <tr class="border-b border-white/5">
                    <td class="py-2 font-medium">${c.vendor}</td>
                    <td class="py-2">${TYPE_LABELS[c.modelType] || c.modelType}</td>
                    <td class="py-2 text-xs text-gray-400 max-w-[200px] truncate">${c.apiEndpoint || '-'}</td>
                    <td class="py-2">${c.pollInterval}s</td>
                    <td class="py-2">${c.maxPollCount}次</td>
                    <td class="py-2">${c.maxRetries}次</td>
                    <td class="py-2"><span class="status-badge ${c.isEnabled ? 'status-completed' : 'status-failed'}">${c.isEnabled ? '启用' : '禁用'}</span></td>
                </tr>
            `).join('');
        }

        async function addConfig() {
            const body = {
                vendor: document.getElementById('vendor').value.trim(),
                modelType: document.getElementById('modelType').value,
                apiEndpoint: document.getElementById('endpoint').value.trim(),
                apiKey: document.getElementById('apiKey').value.trim(),
                pollInterval: parseInt(document.getElementById('pollInterval').value) || 30,
                maxPollCount: parseInt(document.getElementById('maxPoll').value) || 60,
                maxRetries: 3,
                isEnabled: true
            };
            if (!body.vendor) return alert('请输入厂商名');

            await fetch('/api/models/configs', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify(body)
            });
            document.getElementById('configModal').classList.add('hidden');
            loadConfigs();
        }

        loadConfigs();
    </script>
</body>
</html>
