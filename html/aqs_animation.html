<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQS - AbstractQueuedSynchronizer 流程演示</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        :root {
            --bg-deep: #0a0e17;
            --accent-cyan: #22d3ee;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-amber: #f59e0b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass-bg: rgba(15, 20, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.04);
        }

        @keyframes floatParticle {
            0%,
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }
            25% {
                transform: translateY(-30px) translateX(15px);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-15px) translateX(-10px);
                opacity: 0.5;
            }
            75% {
                transform: translateY(-40px) translateX(5px);
                opacity: 0.8;
            }
        }

        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(34, 211, 238, 0.3), 0 0 20px rgba(34, 211, 238, 0.1);
            }
            50% {
                box-shadow: 0 0 20px rgba(34, 211, 238, 0.6), 0 0 45px rgba(34, 211, 238, 0.25);
            }
        }

        @keyframes casFlash {
            0% {
                filter: brightness(1);
                box-shadow: 0 0 0px rgba(245, 158, 11, 0);
            }
            30% {
                filter: brightness(2.5);
                box-shadow: 0 0 40px rgba(245, 158, 11, 0.9), 0 0 80px rgba(245, 158, 11, 0.4);
            }
            100% {
                filter: brightness(1);
                box-shadow: 0 0 0px rgba(245, 158, 11, 0);
            }
        }

        @keyframes slideInFromRight {
            0% {
                transform: translateX(80px);
                opacity: 0;
            }
            60% {
                transform: translateX(-8px);
                opacity: 1;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes wakeUpPulse {
            0% {
                box-shadow: 0 0 0px rgba(16, 185, 129, 0);
                transform: scale(1);
            }
            30% {
                box-shadow: 0 0 35px rgba(16, 185, 129, 0.8), 0 0 60px rgba(16, 185, 129, 0.3);
                transform: scale(1.06);
            }
            70% {
                box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
                transform: scale(1.02);
            }
            100% {
                box-shadow: 0 0 0px rgba(16, 185, 129, 0);
                transform: scale(1);
            }
        }

        @keyframes statusBlink {
            0%,
            100% {
                background-color: currentBg;
            }
            40% {
                background-color: rgba(245, 158, 11, 0.5);
            }
        }

        @keyframes shimmerBtn {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        @keyframes arrowFlow {
            0% {
                stroke-dashoffset: 24;
            }
            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes nodeHighlight {
            0%,
            100% {
                border-color: rgba(255, 255, 255, 0.1);
            }
            50% {
                border-color: rgba(34, 211, 238, 0.8);
            }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        .glass {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 var(--glass-highlight);
        }

        .glass-heavy {
            background: rgba(12, 16, 24, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .btn-shimmer {
            background: linear-gradient(110deg,
            transparent 0%,
            transparent 25%,
            rgba(255, 255, 255, 0.08) 35%,
            rgba(255, 255, 255, 0.15) 45%,
            rgba(255, 255, 255, 0.08) 55%,
            transparent 65%,
            transparent 100%);
            background-size: 200% 100%;
            transition: all 0.3s ease;
        }
        .btn-shimmer:hover {
            animation: shimmerBtn 1.5s ease-in-out infinite;
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.5), 0 0 50px rgba(34, 211, 238, 0.2);
        }
        .btn-shimmer:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }

        .btn-release-shimmer {
            background: linear-gradient(110deg,
            transparent 0%,
            transparent 25%,
            rgba(255, 255, 255, 0.08) 35%,
            rgba(255, 255, 255, 0.15) 45%,
            rgba(255, 255, 255, 0.08) 55%,
            transparent 65%,
            transparent 100%);
            background-size: 200% 100%;
            transition: all 0.3s ease;
        }
        .btn-release-shimmer:hover {
            animation: shimmerBtn 1.5s ease-in-out infinite;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.5), 0 0 50px rgba(168, 85, 247, 0.2);
        }
        .btn-release-shimmer:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }

        .btn-reset-shimmer {
            background: linear-gradient(110deg,
            transparent 0%,
            transparent 25%,
            rgba(255, 255, 255, 0.06) 35%,
            rgba(255, 255, 255, 0.1) 45%,
            rgba(255, 255, 255, 0.06) 55%,
            transparent 65%,
            transparent 100%);
            background-size: 200% 100%;
            transition: all 0.3s ease;
        }
        .btn-reset-shimmer:hover {
            animation: shimmerBtn 1.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 35px rgba(255, 255, 255, 0.1);
        }

        .node-card {
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: default;
        }
        .node-card.slide-in {
            animation: slideInFromRight 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        .node-card.cas-flash {
            animation: casFlash 0.7s ease-out;
        }
        .node-card.wake-up {
            animation: wakeUpPulse 0.8s ease-out;
        }
        .node-card.highlight-node {
            animation: nodeHighlight 0.7s ease-in-out 3;
        }

        .arrow-line {
            transition: all 0.5s ease;
        }

        .log-entry {
            animation: slideInFromRight 0.4s ease-out;
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }
        *::-webkit-scrollbar {
            height: 4px;
        }
        *::-webkit-scrollbar-track {
            background: transparent;
        }
        *::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden"

<!-- 浮动粒子背景 -->

</div>

<!-- 主容器 -->

                </svg>

            </div>
        </div>

        <!-- State 状态指示器 -->
        <div class="flex items-center gap-3 flex-shrink-0">
            <div class="glass rounded-xl px-4 py-2 flex items-center gap-2.5">
                <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">State</span>
                <span id="stateValue"

            <button id="btnAcquireB"

                <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">

<script>
  (function() {
    // ============ 粒子背景 ============
    const particlesContainer = document.getElementById('particlesContainer');
    for (let i = 0; i < 45; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const size = Math.random() * 3 + 1.5;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.setProperty('--duration', (Math.random() * 8 + 6) + 's');
      particle.style.setProperty('--delay', (Math.random() * 5) + 's');
      const colors = ['rgba(34,211,238,0.7)', 'rgba(168,85,247,0.6)', 'rgba(236,72,153,0.5)',
        'rgba(245,158,11,0.5)', 'rgba(16,185,129,0.5)'
      ];
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      particlesContainer.appendChild(particle);
    }

    // ============ AQS 模拟器 ============
    const WAIT_STATUS = { DEFAULT: 0, SIGNAL: -1, CANCELLED: 1, CONDITION: -2, PROPAGATE: -3 };
    const MODE = { EXCLUSIVE: 'EXCLUSIVE', SHARED: 'SHARED' };

    class Node {
      constructor(threadName, mode, waitStatus = 0) {
        this.id = 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        this.thread = threadName;
        this.mode = mode;
        this.waitStatus = waitStatus;
        this.prev = null;
        this.next = null;
        this.nextWaiter = null;
      }
    }

    class AQSSimulator {
      constructor() {
        this.state = 0;
        this.head = null;
        this.tail = null;
        this.exclusiveOwnerThread = null;
        this.nodeCounter = 0;
        this.listeners = [];
      }

      subscribe(fn) { this.listeners.push(fn); }

      notify(event) { this.listeners.forEach(fn => fn(event)); }

      getState() { return this.state; }

      setState(v) { this.state = v; }

      compareAndSetState(expect, update) {
        if (this.state === expect) {
          this.state = update;
          this.notify({ type: 'CAS_SUCCESS', target: 'state', expect, update });
          return true;
        }
        this.notify({ type: 'CAS_FAIL', target: 'state', expect, update, actual: this.state });
        return false;
      }

      tryAcquire(threadName) {
        if (this.compareAndSetState(0, 1)) {
          this.exclusiveOwnerThread = threadName;
          this.notify({ type: 'ACQUIRE_SUCCESS', thread: threadName });
          return true;
        }
        this.notify({ type: 'ACQUIRE_FAIL', thread: threadName });
        return false;
      }

      tryRelease(threadName) {
        if (this.exclusiveOwnerThread !== threadName) {
          this.notify({ type: 'RELEASE_FAIL_NOT_OWNER', thread: threadName, owner: this
              .exclusiveOwnerThread });
          return false;
        }
        if (this.getState() === 0) {
          this.notify({ type: 'RELEASE_FAIL_STATE_ZERO', thread: threadName });
          return false;
        }
        this.exclusiveOwnerThread = null;
        this.setState(0);
        this.notify({ type: 'RELEASE_SUCCESS', thread: threadName });
        return true;
      }

      enq(node) {
        this.notify({ type: 'ENQ_START', nodeId: node.id, thread: node.thread });
        while (true) {
          let t = this.tail;
          if (t === null) {
            // 初始化：创建dummy head
            const dummy = new Node(null, MODE.EXCLUSIVE, 0);
            dummy.id = 'dummy_head';
            if (this.compareAndSetHead(dummy)) {
              this.tail = this.head;
              this.notify({ type: 'ENQ_INIT_DUMMY', dummyId: dummy.id });
            }
          } else {
            node.prev = t;
            if (this.compareAndSetTail(t, node)) {
              t.next = node;
              this.notify({ type: 'ENQ_SUCCESS', nodeId: node.id, thread: node.thread,
                predId: t.id });
              return t;
            }
          }
        }
      }

      compareAndSetHead(update) {
        if (this.head === null) {
          this.head = update;
          this.notify({ type: 'CAS_HEAD_SUCCESS', nodeId: update.id });
          return true;
        }
        return false;
      }

      compareAndSetTail(expect, update) {
        if (this.tail === expect) {
          this.tail = update;
          this.notify({ type: 'CAS_TAIL_SUCCESS', nodeId: update.id, oldTailId: expect ? expect.id :
              'null' });
          return true;
        }
        this.notify({ type: 'CAS_TAIL_FAIL', nodeId: update.id });
        return false;
      }

      addWaiter(threadName, mode) {
        const node = new Node(threadName, mode, 0);
        this.notify({ type: 'ADD_WAITER', nodeId: node.id, thread: threadName, mode });
        let pred = this.tail;
        if (pred !== null) {
          node.prev = pred;
          if (this.compareAndSetTail(pred, node)) {
            pred.next = node;
            this.notify({ type: 'ADD_WAITER_FAST_PATH', nodeId: node.id, thread: threadName,
              predId: pred.id });
            return node;
          }
        }
        this.enq(node);
        return node;
      }

      setHead(node) {
        const oldHead = this.head;
        this.head = node;
        node.thread = null;
        node.prev = null;
        this.notify({ type: 'SET_HEAD', nodeId: node.id, oldHeadId: oldHead ? oldHead.id : 'null' });
      }

      shouldParkAfterFailedAcquire(pred, node) {
        let ws = pred.waitStatus;
        if (ws === WAIT_STATUS.SIGNAL) {
          this.notify({ type: 'SHOULD_PARK_TRUE', nodeId: node.id, predId: pred.id, predWs: ws });
          return true;
        }
        if (ws > 0) {
          // 跳过取消的前驱
          do {
            node.prev = pred = pred.prev;
          } while (pred !== null && pred.waitStatus > 0);
          if (pred) pred.next = node;
          this.notify({ type: 'SKIP_CANCELLED', nodeId: node.id });
          return false;
        } else {
          // 设置SIGNAL
          this.compareAndSetWaitStatus(pred, ws, WAIT_STATUS.SIGNAL);
          this.notify({ type: 'SET_SIGNAL', predId: pred.id, oldWs: ws, newWs: WAIT_STATUS.SIGNAL,
            nodeId: node.id });
          return false;
        }
      }

      compareAndSetWaitStatus(node, expect, update) {
        if (node.waitStatus === expect) {
          node.waitStatus = update;
          this.notify({ type: 'CAS_WAITSTATUS_SUCCESS', nodeId: node.id, expect, update });
          return true;
        }
        this.notify({ type: 'CAS_WAITSTATUS_FAIL', nodeId: node.id, expect, update, actual: node.waitStatus });
        return false;
      }

      unparkSuccessor(node) {
        let ws = node.waitStatus;
        if (ws < 0) {
          this.compareAndSetWaitStatus(node, ws, 0);
        }
        let s = node.next;
        if (s === null || s.waitStatus > 0) {
          s = null;
          for (let t = this.tail; t !== null && t !== node; t = t.prev) {
            if (t.waitStatus <= 0) s = t;
          }
        }
        if (s !== null) {
          this.notify({ type: 'UNPARK_SUCCESSOR', fromNodeId: node.id, successorId: s.id, successorThread: s
              .thread });
          return s;
        }
        this.notify({ type: 'UNPARK_NO_SUCCESSOR', fromNodeId: node.id });
        return null;
      }

      acquire(threadName) {
        this.notify({ type: 'ACQUIRE_START', thread: threadName });
        if (!this.tryAcquire(threadName)) {
          const node = this.addWaiter(threadName, MODE.EXCLUSIVE);
          this.acquireQueued(node, threadName);
          return node;
        }
        return null;
      }

      acquireQueued(node, threadName) {
        this.notify({ type: 'ACQUIRE_QUEUED_START', nodeId: node.id, thread: threadName });
        let interrupted = false;
        // 模拟：尝试获取
        const p = node.prev;
        if (p === this.head && this.tryAcquire(threadName)) {
          this.setHead(node);
          if (p) p.next = null;
          this.notify({ type: 'ACQUIRE_QUEUED_SUCCESS', nodeId: node.id, thread: threadName });
          return;
        }
        // 检查是否应该park
        if (p && this.shouldParkAfterFailedAcquire(p, node)) {
          // 第一次shouldPark返回false（因为刚设置SIGNAL），第二次才park
          // 这里简化：第二次调用shouldPark时返回true，然后park
          if (this.shouldParkAfterFailedAcquire(p, node)) {
            this.notify({ type: 'PARK', nodeId: node.id, thread: threadName });
            node._parked = true;
          }
        }
      }

      release(threadName) {
        this.notify({ type: 'RELEASE_START', thread: threadName });
        if (this.tryRelease(threadName)) {
          let h = this.head;
          if (h !== null && h.waitStatus !== 0) {
            const unparked = this.unparkSuccessor(h);
            if (unparked) {
              unparked._parked = false;
              this.notify({ type: 'THREAD_WOKEN', thread: unparked.thread, nodeId: unparked.id });
              // 被唤醒的线程重新尝试获取锁
              this.wakeUpAndAcquire(unparked);
            }
          }
          return true;
        }
        return false;
      }

      wakeUpAndAcquire(node) {
        this.notify({ type: 'WAKE_UP_ACQUIRE_START', nodeId: node.id, thread: node.thread });
        if (this.tryAcquire(node.thread)) {
          this.setHead(node);
          // 清理前驱next
          const oldPred = node.prev;
          if (oldPred) oldPred.next = null;
          this.notify({ type: 'WAKE_UP_ACQUIRE_SUCCESS', nodeId: node.id, thread: node.thread });
        }
      }

      getQueueNodes() {
        const nodes = [];
        let curr = this.head;
        while (curr !== null) {
          nodes.push(curr);
          curr = curr.next;
        }
        return nodes;
      }

      reset() {
        this.state = 0;
        this.head = null;
        this.tail = null;
        this.exclusiveOwnerThread = null;
        this.nodeCounter = 0;
        this.notify({ type: 'RESET' });
      }
    }

    // ============ UI控制器 ============
    const simulator = new AQSSimulator();
    const nodeContainer = document.getElementById('nodeContainer');
    const emptyQueueHint = document.getElementById('emptyQueueHint');
    const stateValueEl = document.getElementById('stateValue');
    const queueLengthEl = document.getElementById('queueLength');
    const headLabelEl = document.getElementById('headLabel');
    const tailLabelEl = document.getElementById('tailLabel');
    const logEntriesEl = document.getElementById('logEntries');
    const logContainer = document.getElementById('logContainer');

    let logLines = [];

    function addLog(text, type = 'info') {
      const time = new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit',
        second: '2-digit' });
      const colors = {
        info: 'text-slate-300',
        success: 'text-emerald-400',
        fail: 'text-rose-400',
        cas: 'text-amber-400',
        park: 'text-cyan-400',
        wake: 'text-green-300',
        signal: 'text-purple-400',
        enq: 'text-sky-400',
      };
      const colorClass = colors[type] || colors.info;
      logLines.unshift(
        `<div class="log-entry flex gap-2 ${colorClass} text-[11px] leading-relaxed"><span class="text-slate-600 flex-shrink-0">${time}</span><span>${text}</span></div>`
      );
      if (logLines.length > 40) logLines.pop();
      logEntriesEl.innerHTML = logLines.join('');
      logContainer.scrollTop = 0;
    }

    function renderQueue(highlightNodeId = null, animationType = null) {
      const nodes = simulator.getQueueNodes();
      const realWaitNodes = nodes.filter(n => n.thread !== null);
      const queueLen = realWaitNodes.length;

      // 更新状态指示器
      stateValueEl.textContent = simulator.state;
      stateValueEl.style.color = simulator.state === 1 ? '#22d3ee' : '#94a3b8';
      queueLengthEl.textContent = queueLen;
      headLabelEl.textContent = simulator.head ? (simulator.head.thread || 'dummy') : 'null';
      headLabelEl.style.color = simulator.head ? '#34d399' : '#94a3b8';
      tailLabelEl.textContent = simulator.tail ? (simulator.tail.thread || 'dummy') : 'null';
      tailLabelEl.style.color = simulator.tail ? '#f59e0b' : '#94a3b8';

      if (nodes.length === 0) {
        nodeContainer.innerHTML = '';
        nodeContainer.appendChild(emptyQueueHint);
        emptyQueueHint.style.opacity = '1';
        emptyQueueHint.style.display = 'flex';
      } else {
        if (emptyQueueHint.parentNode) {
          emptyQueueHint.style.opacity = '0';
          emptyQueueHint.style.display = 'none';
        }
        let html = '';
        nodes.forEach((node, index) => {
          const isHead = node === simulator.head;
          const isTail = node === simulator.tail;
          const isDummy = node.thread === null;
          const isParked = node._parked === true;

          let borderColor = 'rgba(255,255,255,0.15)';
          let bgGradient = 'rgba(20,28,40,0.8)';
          let statusColor = '#94a3b8';
          let statusText = '0';
          let statusBadgeBg = 'rgba(100,116,139,0.2)';

          switch (node.waitStatus) {
            case -1:
              statusColor = '#f59e0b';
              statusText = 'SIGNAL';
              statusBadgeBg = 'rgba(245,158,11,0.2)';
              borderColor = 'rgba(245,158,11,0.35)';
              break;
            case 1:
              statusColor = '#ef4444';
              statusText = 'CANCEL';
              statusBadgeBg = 'rgba(239,68,68,0.2)';
              borderColor = 'rgba(239,68,68,0.35)';
              break;
            case -2:
              statusColor = '#a855f7';
              statusText = 'COND';
              statusBadgeBg = 'rgba(168,85,247,0.2)';
              borderColor = 'rgba(168,85,247,0.35)';
              break;
            case -3:
              statusColor = '#22d3ee';
              statusText = 'PROP';
              statusBadgeBg = 'rgba(34,211,238,0.2)';
              borderColor = 'rgba(34,211,238,0.35)';
              break;
            default:
              statusColor = '#94a3b8';
              statusText = '0';
              statusBadgeBg = 'rgba(148,163,184,0.15)';
          }

          if (isDummy) {
            bgGradient = 'rgba(30,36,50,0.7)';
            borderColor = 'rgba(255,255,255,0.1)';
          }
          if (isParked) {
            borderColor = 'rgba(34,211,238,0.5)';
            bgGradient = 'rgba(10,30,40,0.8)';
          }

          let animClass = '';
          if (highlightNodeId === node.id) {
            if (animationType === 'slide-in') animClass = 'slide-in';
            if (animationType === 'cas-flash') animClass = 'cas-flash';
            if (animationType === 'wake-up') animClass = 'wake-up';
            if (animationType === 'highlight') animClass = 'highlight-node';
          }

          html += `
                <div class="flex items-center gap-0 flex-shrink-0">
                  ${index > 0 ? `
                  <div class="flex items-center px-1 flex-shrink-0 arrow-line" style="min-width: 36px;">
                    <div class="flex flex-col items-center gap-0">
                      <svg class="w-8 h-4" viewBox="0 0 32 16">
                        <defs>
                          <linearGradient id="arrowGrad${index}" x1="0%" y1="50%" x2="100%" y2="50%">
                            <stop offset="0%" stop-color="rgba(148,163,184,0.3)" />
                            <stop offset="100%" stop-color="rgba(148,163,184,0.7)" />
                          </linearGradient>
                        </defs>
                        <line x1="0" y1="8" x2="28" y2="8" stroke="url(#arrowGrad${index})" stroke-width="1.5" stroke-dasharray="4,3" />
                        <polygon points="26,3 32,8 26,13" fill="rgba(148,163,184,0.5)" />
                      </svg>
                      <span class="text-[9px] text-slate-600 -mt-0.5">next→</span>
                    </div>
                    <div class="flex flex-col items-center gap-0 ml-0.5">
                      <svg class="w-8 h-4 rotate-180" viewBox="0 0 32 16">
                        <line x1="0" y1="8" x2="28" y2="8" stroke="rgba(148,163,184,0.2)" stroke-width="1" stroke-dasharray="3,4" />
                        <polygon points="26,3 32,8 26,13" fill="rgba(148,163,184,0.25)" />
                      </svg>
                      <span class="text-[9px] text-slate-700 -mt-0.5">←prev</span>
                    </div>
                  </div>` : ''}
                  <div class="node-card flex-shrink-0 rounded-2xl px-4 py-3 ${animClass} transition-all duration-500"
                    style="background: ${bgGradient}; border: 2px solid ${borderColor}; min-width: 110px; position: relative;"
                    id="card_${node.id}">
                    ${isHead ? '<div class="absolute -top-3 left-1/2 -translate-x-1/2 text-[10px] font-bold text-emerald-400 bg-[#0a0e17] px-2 rounded-full border border-emerald-500/30">HEAD</div>' : ''}
                    ${isTail ? '<div class="absolute -bottom-3 left-1/2 -translate-x-1/2 text-[10px] font-bold text-amber-400 bg-[#0a0e17] px-2 rounded-full border border-amber-500/30">TAIL</div>' : ''}
                    ${isParked ? '<div class="absolute -top-3 right-2 text-[9px] font-bold text-cyan-400 bg-[#0a0e17] px-1.5 rounded-full border border-cyan-500/40 animate-pulse">PARKED</div>' : ''}
                    <div class="text-center">
                      <div class="text-white font-bold text-sm truncate" style="max-width: 90px;">
                        ${isDummy ? '🤖 Dummy' : node.thread}
                      </div>
                      <div class="mt-1.5 flex items-center justify-center gap-1">
                        <span class="text-[10px] text-slate-500">ws:</span>
                        <span class="text-xs font-bold rounded-md px-1.5 py-0.5 transition-colors duration-500"
                          style="color: ${statusColor}; background: ${statusBadgeBg};">
                          ${statusText}
                        </span>
                      </div>
                      ${!isDummy ? `<div class="text-[9px] text-slate-600 mt-1">EXCLUSIVE</div>` : ''}
                    </div>
                  </div>
                </div>`;
        });
        nodeContainer.innerHTML = html;
      }
    }

    function flashNode(nodeId, animType) {
      const card = document.getElementById('card_' + nodeId);
      if (card) {
        card.classList.remove('slide-in', 'cas-flash', 'wake-up', 'highlight-node');
        void card.offsetWidth;
        if (animType === 'slide-in') card.classList.add('slide-in');
        if (animType === 'cas-flash') card.classList.add('cas-flash');
        if (animType === 'wake-up') card.classList.add('wake-up');
        if (animType === 'highlight') card.classList.add('highlight-node');
      }
    }

    simulator.subscribe((event) => {
      switch (event.type) {
        case 'ACQUIRE_START':
          addLog(`🔵 ${event.thread} 开始尝试获取锁...`, 'info');
          break;
        case 'CAS_SUCCESS':
          addLog(`⚡ CAS成功: state ${event.expect}→${event.update} (原子操作)`, 'cas');
          break;
        case 'CAS_FAIL':
          addLog(`❌ CAS失败: 期望${event.expect}, 实际${event.actual}`, 'fail');
          break;
        case 'ACQUIRE_SUCCESS':
          addLog(`✅ ${event.thread} 成功获取锁! state=1`, 'success');
          renderQueue(null, null);
          break;
        case 'ACQUIRE_FAIL':
          addLog(`🚫 ${event.thread} 获取锁失败，准备入队...`, 'fail');
          break;
        case 'ADD_WAITER':
          addLog(`📝 ${event.thread} 创建节点准备入队 (mode: ${event.mode})`, 'enq');
          break;
        case 'ENQ_INIT_DUMMY':
          addLog(`🏗️ 队列为空，初始化Dummy Head节点`, 'enq');
          break;
        case 'CAS_HEAD_SUCCESS':
          addLog(`📌 CAS设置Head: Dummy节点`, 'cas');
          break;
        case 'CAS_TAIL_SUCCESS':
          addLog(`📌 CAS设置Tail: ${event.nodeId}`, 'cas');
          break;
        case 'ENQ_SUCCESS':
          addLog(`🔗 ${event.thread} 节点入队成功，前驱: ${event.predId}`, 'enq');
          renderQueue(event.nodeId, 'slide-in');
          setTimeout(() => flashNode(event.nodeId, 'slide-in'), 50);
          break;
        case 'ADD_WAITER_FAST_PATH':
          addLog(`⚡ 快速路径入队: ${event.thread}`, 'enq');
          renderQueue(event.nodeId, 'slide-in');
          setTimeout(() => flashNode(event.nodeId, 'slide-in'), 50);
          break;
        case 'SET_SIGNAL':
          addLog(`📡 设置前驱 ${event.predId} waitStatus: ${event.oldWs}→SIGNAL(-1)`, 'signal');
          renderQueue(event.predId, 'highlight');
          setTimeout(() => flashNode(event.predId, 'highlight'), 50);
          break;
        case 'SHOULD_PARK_TRUE':
          addLog(`⏸️ ${event.nodeId} 应该Park，前驱已设置SIGNAL`, 'park');
          break;
        case 'PARK':
          addLog(`💤 ${event.thread} 被Park阻塞，等待唤醒...`, 'park');
          renderQueue(event.nodeId, 'highlight');
          setTimeout(() => flashNode(event.nodeId, 'highlight'), 50);
          break;
        case 'RELEASE_START':
          addLog(`🔓 ${event.thread} 开始释放锁...`, 'info');
          break;
        case 'RELEASE_SUCCESS':
          addLog(`✅ ${event.thread} 释放锁成功! state=0`, 'success');
          break;
        case 'RELEASE_FAIL_NOT_OWNER':
          addLog(`⚠️ ${event.thread} 释放失败：不是锁持有者(持有者: ${event.owner})`, 'fail');
          break;
        case 'RELEASE_FAIL_STATE_ZERO':
          addLog(`⚠️ 释放失败：state已经为0`, 'fail');
          break;
        case 'UNPARK_SUCCESSOR':
          addLog(`🔔 唤醒后继节点: ${event.successorThread} (从${event.fromNodeId})`, 'wake');
          renderQueue(event.successorId, 'wake-up');
          setTimeout(() => flashNode(event.successorId, 'wake-up'), 50);
          break;
        case 'UNPARK_NO_SUCCESSOR':
          addLog(`📭 没有后继节点需要唤醒`, 'info');
          break;
        case 'THREAD_WOKEN':
          addLog(`🌅 ${event.thread} 被唤醒，重新竞争锁!`, 'wake');
          break;
        case 'WAKE_UP_ACQUIRE_START':
          addLog(`🔄 ${event.thread} 醒后重新tryAcquire...`, 'wake');
          break;
        case 'WAKE_UP_ACQUIRE_SUCCESS':
          addLog(`🏆 ${event.thread} 唤醒后成功获取锁!`, 'success');
          renderQueue(event.nodeId, 'cas-flash');
          setTimeout(() => flashNode(event.nodeId, 'cas-flash'), 50);
          break;
        case 'SET_HEAD':
          addLog(`🎯 setHead: ${event.nodeId} 成为新Head (旧Head: ${event.oldHeadId})`, 'success');
          renderQueue(event.nodeId, 'highlight');
          setTimeout(() => flashNode(event.nodeId, 'highlight'), 50);
          break;
        case 'RESET':
          addLog(`🔄 系统重置`, 'info');
          logLines = [];
          renderQueue(null, null);
          break;
        default:
          break;
      }
      // 最终渲染
      if (!['ADD_WAITER_FAST_PATH', 'ENQ_SUCCESS', 'SET_SIGNAL', 'PARK', 'UNPARK_SUCCESSOR', 'WAKE_UP_ACQUIRE_SUCCESS',
        'SET_HEAD', 'ACQUIRE_SUCCESS', 'RESET'
      ].includes(event.type)) {
        renderQueue(null, null);
      }
    });

    // ============ 按钮事件 ============
    function disableButtons(ms) {
      const buttons = [btnAcquireA, btnAcquireB, btnAcquireC, btnRelease, btnReset];
      buttons.forEach(b => b.disabled = true);
      buttons.forEach(b => b.style.opacity = '0.5');
      buttons.forEach(b => b.style.pointerEvents = 'none');
      setTimeout(() => {
        buttons.forEach(b => b.disabled = false);
        buttons.forEach(b => b.style.opacity = '1');
        buttons.forEach(b => b.style.pointerEvents = 'auto');
        updateButtonStates();
      }, ms);
    }

    function updateButtonStates() {
      const hasLock = simulator.state === 1;
      const owner = simulator.exclusiveOwnerThread;

      btnRelease.disabled = !hasLock;
      btnRelease.style.opacity = hasLock ? '1' : '0.4';
      btnRelease.style.pointerEvents = hasLock ? 'auto' : 'none';
      if (hasLock) {
        btnRelease.title = `释放锁 (持有者: ${owner})`;
      } else {
        btnRelease.title = '没有锁可释放';
      }

      btnAcquireA.disabled = false;
      btnAcquireB.disabled = false;
      btnAcquireC.disabled = false;
      btnAcquireA.style.opacity = '1';
      btnAcquireB.style.opacity = '1';
      btnAcquireC.style.opacity = '1';
      btnAcquireA.style.pointerEvents = 'auto';
      btnAcquireB.style.pointerEvents = 'auto';
      btnAcquireC.style.pointerEvents = 'auto';
    }

    const btnAcquireA = document.getElementById('btnAcquireA');
    const btnAcquireB = document.getElementById('btnAcquireB');
    const btnAcquireC = document.getElementById('btnAcquireC');
    const btnRelease = document.getElementById('btnRelease');
    const btnReset = document.getElementById('btnReset');

    btnAcquireA.addEventListener('click', () => {
      disableButtons(900);
      simulator.acquire('Thread-A');
      updateButtonStates();
    });

    btnAcquireB.addEventListener('click', () => {
      disableButtons(900);
      simulator.acquire('Thread-B');
      updateButtonStates();
    });

    btnAcquireC.addEventListener('click', () => {
      disableButtons(900);
      simulator.acquire('Thread-C');
      updateButtonStates();
    });

    btnRelease.addEventListener('click', () => {
      disableButtons(900);
      const owner = simulator.exclusiveOwnerThread;
      if (owner) {
        simulator.release(owner);
      }
      updateButtonStates();
    });

    btnReset.addEventListener('click', () => {
      simulator.reset();
      logLines = [];
      logEntriesEl.innerHTML =
        '<div class="text-slate-500 text-[11px]">⏳ 等待操作... 点击按钮模拟线程竞争锁</div>';
      updateButtonStates();
      renderQueue(null, null);
    });

    // 初始渲染
    renderQueue(null, null);
    updateButtonStates();

    // ============ 键盘快捷键 ============
    document.addEventListener('keydown', (e) => {
      switch (e.key.toLowerCase()) {
        case 'a':
          btnAcquireA.click();
          break;
        case 'b':
          btnAcquireB.click();
          break;
        case 'c':
          btnAcquireC.click();
          break;
        case 'r':
          btnRelease.click();
          break;
        case 'x':
          btnReset.click();
          break;
        default:
          break;
      }
    });

    // 初始欢迎日志
    addLog('🚀 AQS独占锁演示就绪 | 按键: A/B/C=Acquire R=Release X=Reset', 'info');
    addLog('💡 提示: Thread-A首次获取锁无需入队，后续线程竞争失败则加入CLH队列', 'info');

    console.log('%c🔐 AQS Simulator Ready %c| %cCLH Queue Visualizer',
      'color:#22d3ee;font-size:16px;', 'color:#94a3b8;', 'color:#a855f7;');
    console.log('%c  Keys: A/B/C = Acquire | R = Release | X = Reset',
      'color:#f59e0b;font-size:12px;');
  })();
</script>
</body>
</html>
