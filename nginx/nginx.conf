# Nginx 配置文件
# 用途: 代理前端和后端服务

worker_processes  auto;

error_log  /var/log/nginx/error.log info;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 标准日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # ===== JSON格式日志（Python采集器专用）=====
    # 支持从自定义请求头获取真实IP（解决内网穿透无法获取真实IP的问题）
    # X-Custom-Real-IP 是自定义头，用于绕过内网穿透拦截
    log_format json_log escape=json '{'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"time_local":"$time_local",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"request_protocol":"$server_protocol",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"http_x_custom_real_ip":"$http_x_custom_real_ip",'   # 自定义头，绕过内网穿透拦截（优先级最高）
        '"http_x_real_ip":"$http_x_real_ip",'
        '"http_x_client_ip":"$http_x_client_ip",'
        '"http_x_remote_addr":"$http_x_remote_addr",'
        '"http_x_public_ip":"$http_x_public_ip",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_time":"$request_time",'
        '"host":"$host"'
    '}';

    # 同时输出两种格式的日志
    access_log  /var/log/nginx/access.log  main;
    access_log  /var/log/nginx/access_json.log  json_log;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    # WebSocket 连接升级映射
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 从 Host 头动态提取端口
    map $http_host $forwarded_port {
        ~^.+:(\d+)$  $1;
        default       $server_port;
    }

    server {
        listen       9567;
        server_name  localhost;
        port_in_redirect off;

        # Let-It-Cook Admin 管理端（静态文件）
        location /let-it-cook-admin/ {
            alias /opt/nginx/html/let-it-cook-admin/;
            index index.html;
            try_files $uri $uri/ /let-it-cook-admin/index.html;

            # 缓存静态资源
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # IP 组件文件服务
        location /ip-widget.css {
            root   html;
        }
        location /ip-widget.js {
            root   html;
        }

        # Let-It-Cook Client 客户端（静态文件）
        # 打包后将 client/dist 的内容放到 /opt/nginx/html/let-it-cook-client/ 目录
        location /let-it-cook-client/ {
            alias /opt/nginx/html/let-it-cook-client/;
            index index.html;
            try_files $uri $uri/ /let-it-cook-client/index.html;

            # 缓存静态资源
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # 文件访问代理（访问 MinIO 文件）
        location /files/ {
            proxy_pass http://192.168.3.100:9000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 大文件支持
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 0;
            
            # 长连接支持
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # 根路径显示导航页面
        location = / {
            root   html;
            index  index.html index.htm;
        }

        # 日志大屏代理（Flask服务）
        location /log-screen/ {
            proxy_pass http://127.0.0.1:5000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # 精确匹配 /py-file（无尾随斜杠），做内部 rewrite 避免外部重定向带端口
        location = /py-file {
            rewrite ^ /py-file/ last;
        }

        location /py-file/ {
            proxy_pass http://192.168.2.3:8000/;  # 末尾必须加 /
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }


        # ===== 工具集代理配置 =====
        
        # 随机密码生成器
        location /tools/password/ {
            proxy_pass http://127.0.0.1:5001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 二维码生成器
        location /tools/qrcode/ {
            proxy_pass http://127.0.0.1:5002/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 颜色选择器
        location /tools/color/ {
            proxy_pass http://127.0.0.1:5003/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 倒计时器
        location /tools/countdown/ {
            proxy_pass http://127.0.0.1:5004/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 单词记忆游戏
        location /tools/word-memory/ {
            proxy_pass http://127.0.0.1:5005/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 笑话生成器
        location /tools/joke/ {
            proxy_pass http://127.0.0.1:5006/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # BMI计算器
        location /tools/bmi/ {
            proxy_pass http://127.0.0.1:5007/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 单位转换器
        location /tools/unit/ {
            proxy_pass http://127.0.0.1:5008/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 壁纸生成器
        location /tools/wallpaper/ {
            proxy_pass http://127.0.0.1:5009/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 猜数字游戏
        location /tools/number-guessing/ {
            proxy_pass http://127.0.0.1:5010/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 知识库（MD解析学习笔记）
        location /tools/knowledge/ {
            proxy_pass http://127.0.0.1:5011/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Poker 德扑计分器应用代理
        location /poker {
            proxy_pass http://192.168.3.200:80;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 3600s;
        }

        # Poker Odds Probe 胜率计算器代理
        location /poker-odds {
            proxy_pass http://192.168.3.100:8085;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 600s;
        }

        # 日志大屏API代理（必须在通用/api/路由之前）
        location /api/statistics {
            proxy_pass http://127.0.0.1:5000/api/statistics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 日志大屏实时API代理
        location /api/realtime {
            proxy_pass http://127.0.0.1:5000/api/realtime;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # SSE需要特殊配置
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
        }

        # 日志大屏日志查询API
        location /api/logs {
            proxy_pass http://127.0.0.1:5000/api/logs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API 代理（所有 /api 开头的请求转发到 Spring Cloud Gateway）
        location /api/ {
            proxy_pass http://192.168.3.100:19999/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $forwarded_port;

            # 大文件上传支持
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 0;

            # 长连接支持
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # 默认页面
        location / {
            root   html;
            index  index.html index.htm;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
