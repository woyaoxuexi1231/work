<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx日志数据大屏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/ip-widget.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .glow-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .glow-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-2xx { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .status-3xx { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-4xx { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .status-5xx { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        
        .log-entry {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #3b82f6;
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            margin-bottom: 6px;
        }
        
        .scrollbar-hidden::-webkit-scrollbar {
            display: none;
        }
        
        .scrollbar-hidden {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* 详情弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 24px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-content .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }

        .modal-content .scrollbar-thin::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        .modal-content .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="max-w-screen-2xl mx-auto">
        <!-- 头部标题 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                    📊 Nginx 日志数据大屏
                </h1>
                <p class="text-gray-400 text-sm mt-1">实时监控 · 数据可视化</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-gray-400 text-sm">更新时间:</span>
                <span id="update-time" class="text-blue-400 font-mono text-sm">--:--:--</span>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
            <div class="glow-box stat-card">
                <div class="text-gray-400 text-sm mb-1">今日访问量</div>
                <div class="stat-number" id="today-visits">--</div>
            </div>
            <div class="glow-box stat-card">
                <div class="text-gray-400 text-sm mb-1">总访问量</div>
                <div class="stat-number" id="total-visits">--</div>
            </div>
            <div class="glow-box stat-card">
                <div class="text-gray-400 text-sm mb-1">今日独立IP</div>
                <div class="stat-number" id="today-ips">--</div>
            </div>
            <div class="glow-box stat-card">
                <div class="text-gray-400 text-sm mb-1">平均响应时间</div>
                <div class="stat-number" id="avg-time">--</div>
            </div>
            <div class="glow-box stat-card">
                <div class="text-gray-400 text-sm mb-1">今日流量</div>
                <div class="stat-number" id="today-traffic">--</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
            <!-- 状态码分布 -->
            <div class="glow-box">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <span>📈</span> 状态码分布
                </h3>
                <canvas id="statusChart" height="200"></canvas>
            </div>
            
            <!-- 小时访问趋势 -->
            <div class="glow-box">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <span>📊</span> 实时访问趋势
                </h3>
                <canvas id="trendChart" height="200"></canvas>
            </div>
        </div>

        <!-- 详细数据区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- TOP请求 -->
            <div class="glow-box">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <span>🔥</span> TOP请求路径
                </h3>
                <div id="top-requests" class="space-y-2">
                    <div class="text-gray-500 text-center py-8">加载中...</div>
                </div>
            </div>
            
            <!-- 状态码详情 -->
            <div class="glow-box">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <span>📋</span> 状态码详情
                </h3>
                <div id="status-details" class="space-y-2">
                    <div class="text-gray-500 text-center py-8">加载中...</div>
                </div>
            </div>
            
            <!-- 实时日志 -->
            <div class="glow-box lg:col-span-1">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <span>⚡</span> 实时日志
                    <span class="text-xs text-green-400 animate-pulse">LIVE</span>
                </h3>
                <div id="realtime-logs" class="overflow-y-auto scrollbar-hidden">
                    <div class="text-gray-500 text-center py-8">连接中...</div>
                </div>
            </div>
        </div>

        <!-- 日志列表表格 -->
        <div class="glow-box mt-4">
            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <span>📝</span> 最近日志记录
            </h3>

            <!-- 筛选区域 -->
            <div class="mb-4 p-4 bg-white/5 rounded-lg">
                <div class="flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-gray-400 text-xs mb-1">真实IP</label>
                        <input type="text" id="filter-ip" placeholder="输入IP搜索"
                            class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-400 w-36">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-xs mb-1">状态码</label>
                        <select id="filter-status"
                            class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-400 w-28">
                            <option value="">全部</option>
                            <option value="200">200</option>
                            <option value="304">304</option>
                            <option value="400">400</option>
                            <option value="404">404</option>
                            <option value="500">500</option>
                            <option value="502">502</option>
                            <option value="503">503</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-xs mb-1">请求方法</label>
                        <select id="filter-method"
                            class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-400 w-24">
                            <option value="">全部</option>
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                            <option value="PUT">PUT</option>
                            <option value="DELETE">DELETE</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-xs mb-1">开始时间</label>
                        <input type="datetime-local" id="filter-start"
                            class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-400">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-xs mb-1">结束时间</label>
                        <input type="datetime-local" id="filter-end"
                            class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-400">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="applyFilters()"
                            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium transition-colors">
                            筛选
                        </button>
                        <button onclick="resetFilters()"
                            class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded text-sm font-medium transition-colors">
                            重置
                        </button>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm" id="log-table">
                    <thead id="log-table-head">
                        <tr class="text-gray-400 border-b border-gray-700">
                            <th class="text-left py-3 px-4">时间</th>
                            <th class="text-left py-3 px-4">真实IP</th>
                            <th class="text-left py-3 px-4">请求路径</th>
                            <th class="text-left py-3 px-4">设备</th>
                            <th class="text-left py-3 px-4">流量大小</th>
                            <th class="text-left py-3 px-4">响应时间</th>
                            <th class="text-left py-3 px-4">状态</th>
                            <th class="text-left py-3 px-4">操作</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body">
                        <tr>
                            <td colspan="8" class="text-center py-8 text-gray-500">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 详情弹窗 -->
        <div id="detail-modal" class="modal-overlay" style="display:none;">
            <div class="modal-content glow-box">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold">📋 日志详情</h3>
                    <button onclick="closeDetailModal()" class="text-gray-400 hover:text-white text-xl">&times;</button>
                </div>
                <div id="detail-content" class="max-h-96 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        let statusChart, trendChart;
        let clientIP = '';
        const IP_CACHE_KEY = 'common_real_ip';
        const IP_CACHE_TIMESTAMP_KEY = 'common_real_ip_timestamp';

        // 字段翻译映射表 - 仅保留核心业务字段翻译，HTTP协议字段使用原名
        const fieldTranslations = {
            'id': 'ID',
            'time_local': '时间',
            'remote_addr': '远程地址',
            'remote_user': '远程用户',
            'request_method': '请求方法',
            'request_uri': '请求路径',
            'request_protocol': '协议',
            'status': '状态码',
            'body_bytes_sent': '响应大小',
            'http_referer': '来源',
            'http_user_agent': '用户代理',
            'upstream_response_time': '上游响应时间',
            'request_time': '请求时间',
            'host': '主机',
            'real_ip': '真实IP'
            // 以下HTTP协议相关字段不翻译，直接显示原字段名
            // http_x_forwarded_for, upstream_addr, client_ip 等
        };

        function getFieldDisplayName(fieldName) {
            return fieldTranslations[fieldName] || fieldName;
        }

        // 打开详情弹窗
        function openDetailModal(data) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');

            let html = '<div class="space-y-2">';
            for (const [key, value] of Object.entries(data)) {
                const displayName = getFieldDisplayName(key);
                let displayValue = value ?? '-';

                if (key === 'status') {
                    const badgeClass = getBadgeClass(value);
                    displayValue = `<span class="status-badge ${badgeClass}">${value}</span>`;
                } else if (key === 'request_time') {
                    displayValue = `${value}s`;
                } else if (key === 'body_bytes_sent') {
                    displayValue = formatBytes(value);
                } else if (typeof value === 'string' && value.length > 100) {
                    displayValue = `<span class="truncate block max-w-md" title="${escapeHtml(value)}">${escapeHtml(value)}</span>`;
                } else {
                    displayValue = escapeHtml(String(displayValue));
                }

                html += `
                    <div class="flex border-b border-gray-700/50 py-2">
                        <span class="w-32 flex-shrink-0 text-gray-400 text-sm">${displayName}</span>
                        <span class="text-gray-200 text-sm flex-1 break-all">${displayValue}</span>
                    </div>
                `;
            }
            html += '</div>';

            content.innerHTML = html;
            modal.style.display = 'flex';
        }

        // 关闭详情弹窗
        function closeDetailModal() {
            document.getElementById('detail-modal').style.display = 'none';
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化字节数
        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 获取筛选条件
        function getFilterParams() {
            const ip = document.getElementById('filter-ip').value.trim();
            const status = document.getElementById('filter-status').value;
            const method = document.getElementById('filter-method').value;
            const startTime = document.getElementById('filter-start').value;
            const endTime = document.getElementById('filter-end').value;

            const params = new URLSearchParams();
            if (ip) params.append('ip', ip);
            if (status) params.append('status', status);
            if (method) params.append('method', method);
            if (startTime) params.append('start_time', startTime.replace('T', ' ') + ':00');
            if (endTime) params.append('end_time', endTime.replace('T', ' ') + ':00');
            return params;
        }

        // 应用筛选
        function applyFilters() {
            fetchFilteredLogs();
        }

        // 重置筛选
        function resetFilters() {
            document.getElementById('filter-ip').value = '';
            document.getElementById('filter-status').value = '';
            document.getElementById('filter-method').value = '';
            document.getElementById('filter-start').value = '';
            document.getElementById('filter-end').value = '';
            fetchFilteredLogs();
        }

        // 获取筛选后的日志
        async function fetchFilteredLogs() {
            try {
                const params = getFilterParams();
                params.append('limit', '100');
                const url = getUrlWithIP('/api/logs?' + params.toString());
                const response = await fetch(url, { headers: getHeaders() });
                const data = await response.json();
                updateLogTable(data.data || []);
            } catch (error) {
                console.error('获取日志失败:', error);
            }
        }

        // 点击弹窗外部关闭
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('detail-modal');
            if (e.target === modal) {
                closeDetailModal();
            }
        });

        // ESC键关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeDetailModal();
            }
        });

        function getCachedIP() {
            try {
                const cachedIP = localStorage.getItem(IP_CACHE_KEY);
                const cachedTime = localStorage.getItem(IP_CACHE_TIMESTAMP_KEY);
                if (cachedIP && cachedTime) {
                    const elapsed = Date.now() - parseInt(cachedTime);
                    if (elapsed < 10 * 60 * 1000) {
                        return cachedIP;
                    }
                }
            } catch (e) {
                console.warn('读取IP缓存失败:', e);
            }
            return null;
        }

        function getClientIP() {
            if (!clientIP) {
                clientIP = getCachedIP() || '';
            }
            return clientIP;
        }

        function getUrlWithIP(baseUrl) {
            const ip = getClientIP();
            if (ip) {
                const separator = baseUrl.includes('?') ? '&' : '?';
                return baseUrl + separator + 'client_ip=' + encodeURIComponent(ip);
            }
            return baseUrl;
        }

        function getHeaders() {
            const ip = getClientIP();
            return { 'X-Client-IP': ip || '' };
        }

        async function fetchStatistics() {
            try {
                const url = getUrlWithIP('/api/statistics');
                const response = await fetch(url, { headers: getHeaders() });
                const data = await response.json();
                
                // 更新统计卡片
                document.getElementById('today-visits').textContent = data.today_visits.toLocaleString();
                document.getElementById('total-visits').textContent = data.total_visits.toLocaleString();
                document.getElementById('today-ips').textContent = data.today_unique_ips.toLocaleString();
                
                const avgTime = parseFloat(data.response_time?.avg_time) || 0;
                document.getElementById('avg-time').textContent = avgTime.toFixed(2) + 's';

                // 更新流量统计
                document.getElementById('today-traffic').textContent = formatBytes(data.today_traffic || 0);

                // 更新状态码分布图表
                updateStatusChart(data.status_distribution);
                
                // 更新分钟趋势图表（兼容hourly_trend作为备选）
                    updateTrendChart(data.minute_trend || data.hourly_trend || []);
                
                // 更新TOP请求
                updateTopRequests(data.top_requests);
                
                // 更新状态码详情
                updateStatusDetails(data.status_distribution);
                
                // 更新日志表格
                updateLogTable(data.recent_logs);
                
                updateTime();
            } catch (error) {
                console.error('获取统计数据失败:', error);
            }
        }
        
        // 更新状态码分布图表
        function updateStatusChart(data) {
            const ctx = document.getElementById('statusChart').getContext('2d');
            
            const statusMap = {
                '2xx': { label: '成功', color: '#4ade80' },
                '3xx': { label: '重定向', color: '#60a5fa' },
                '4xx': { label: '客户端错误', color: '#fbbf24' },
                '5xx': { label: '服务端错误', color: '#f87171' }
            };
            
            const grouped = { '2xx': 0, '3xx': 0, '4xx': 0, '5xx': 0 };
            data.forEach(item => {
                const status = parseInt(item.status);
                if (status >= 200 && status < 300) grouped['2xx'] += item.count;
                else if (status >= 300 && status < 400) grouped['3xx'] += item.count;
                else if (status >= 400 && status < 500) grouped['4xx'] += item.count;
                else if (status >= 500) grouped['5xx'] += item.count;
            });
            
            const labels = Object.keys(grouped).map(k => statusMap[k].label);
            const values = Object.values(grouped);
            const colors = Object.keys(grouped).map(k => statusMap[k].color);
            
            if (statusChart) statusChart.destroy();
            
            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data: values, backgroundColor: colors }] },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'right' } },
                    cutout: '60%'
                }
            });
        }
        
        // 更新小时趋势图表（只显示最近2小时）
        function updateTrendChart(data) {
            const ctx = document.getElementById('trendChart').getContext('2d');

            // 按时间排序（分钟级数据）
            data.sort((a, b) => {
                const timeA = a.hour || a.time || '';
                const timeB = b.hour || b.time || '';
                return timeA.localeCompare(timeB);
            });

            // 只显示最近30分钟的数据
            const recentData = data.slice(-30);

            const labels = recentData.map(item => item.hour || item.time || '');
            const values = recentData.map(item => item.count);

            if (trendChart) trendChart.destroy();

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: '访问量',
                        data: values,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                responsive: true,
                interaction: {
                  intersect: false,   // ✅ 关键：移到线上就能看
                  mode: 'index'
                },
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    enabled: true,
                    backgroundColor: 'rgba(15,15,35,0.9)',
                    borderColor: 'rgba(59,130,246,0.6)',
                    borderWidth: 1,
                    cornerRadius: 6,
                    padding: 10,
                    displayColors: false,
                    callbacks: {
                      title: ctx => ctx[0].label,
                      label: ctx => `访问量：${ctx.raw}`
                    }
                  }
                },
                scales: {
                  y: {
                    beginAtZero: true,
                    grid: { color: 'rgba(255,255,255,0.08)' }
                  },
                  x: {
                    grid: { display: false }
                  }
                }
                }
            });
        }
        
        // 更新TOP请求
        function updateTopRequests(data) {
            const container = document.getElementById('top-requests');
            container.innerHTML = data.slice(0, 10).map((item, index) => `
                <div class="flex items-center gap-3 p-2 rounded-lg bg-white/5">
                    <span class="w-6 h-6 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center text-xs font-bold">${index + 1}</span>
                    <span class="flex-1 text-sm truncate text-gray-300">${item.request_uri}</span>
                    <span class="text-xs text-gray-500">${item.count}</span>
                </div>
            `).join('');
        }
        
        // 更新状态码详情
        function updateStatusDetails(data) {
            const container = document.getElementById('status-details');
            container.innerHTML = data.map(item => {
                const status = parseInt(item.status);
                let badgeClass = 'status-2xx';
                if (status >= 300 && status < 400) badgeClass = 'status-3xx';
                else if (status >= 400 && status < 500) badgeClass = 'status-4xx';
                else if (status >= 500) badgeClass = 'status-5xx';
                
                return `
                    <div class="flex items-center justify-between p-2 rounded-lg bg-white/5">
                        <span class="status-badge ${badgeClass}">${item.status}</span>
                        <span class="text-sm text-gray-300">${item.count} 次</span>
                    </div>
                `;
            }).join('');
        }
        
        // 更新日志表格（简化显示 + 详情按钮）
        function updateLogTable(data) {
            const tbody = document.getElementById('log-table-body');

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.slice(0, 10).map(item => {
                const badgeClass = getBadgeClass(item.status);
                const requestUri = item.request_uri || item.uri || '-';
                const requestMethod = item.request_method || '';
                const fullPath = requestMethod ? `${requestMethod} ${requestUri}` : requestUri;
                const deviceInfo = parseUserAgent(item.http_user_agent);

                return `
                    <tr class="border-b border-gray-700/50 hover:bg-white/5">
                        <td class="py-3 px-4 text-gray-400 font-mono text-xs">${item.time_local || '-'}</td>
                        <td class="py-3 px-4 text-gray-300 font-mono text-xs">${item.real_ip || '-'}</td>
                        <td class="py-3 px-4 text-gray-300 text-xs max-w-xs truncate" title="${escapeHtml(fullPath)}">${escapeHtml(fullPath)}</td>
                        <td class="py-3 px-4 text-gray-400 text-xs" title="${escapeHtml(item.http_user_agent || '')}">${deviceInfo}</td>
                        <td class="py-3 px-4 text-gray-400 text-xs">${formatBytes(item.body_bytes_sent)}</td>
                        <td class="py-3 px-4 text-gray-400 text-xs">${formatTime(item.request_time)}</td>
                        <td class="py-3 px-4"><span class="status-badge ${badgeClass}">${item.status}</span></td>
                        <td class="py-3 px-4">
                            <button onclick='openDetailModal(${JSON.stringify(item).replace(/'/g, "&#39;")})'
                                class="text-blue-400 hover:text-blue-300 text-xs underline">查看详情</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 解析User-Agent，提取设备信息
        function parseUserAgent(ua) {
            if (!ua || ua === '-' || ua === 'undefined') return '-';
            
            // 设备类型优先级：爬虫 > 移动端 > 平板 > PC
            if (/bot|crawler|spider|slurp|curl|wget|python-requests|Postman|HttpClient/i.test(ua)) {
                if (/Googlebot/i.test(ua)) return '🤖 Google爬虫';
                if (/Bingbot/i.test(ua)) return '🤖 Bing爬虫';
                if (/Baiduspider/i.test(ua)) return '🤖 百度爬虫';
                if (/360Spider/i.test(ua)) return '🤖 360爬虫';
                if (/Sogou|Soso/i.test(ua)) return '🤖 搜狗爬虫';
                return '🤖 爬虫';
            }
            
            // 移动端检测
            if (/Mobile|Android|iPhone|iPod|BlackBerry|Windows Phone/i.test(ua)) {
                if (/iPhone/i.test(ua)) return '📱 iPhone';
                if (/iPad/i.test(ua)) return '📱 iPad';
                if (/Android/i.test(ua)) {
                    if (/Xiaomi|Mi/i.test(ua)) return '📱 小米';
                    if (/Huawei|Honor/i.test(ua)) return '📱 华为';
                    if (/OPPO/i.test(ua)) return '📱 OPPO';
                    if (/vivo/i.test(ua)) return '📱 vivo';
                    if (/Samsung|Galaxy/i.test(ua)) return '📱 三星';
                    if (/Meizu/i.test(ua)) return '📱 魅族';
                    if (/OnePlus/i.test(ua)) return '📱 一加';
                    return '📱 Android';
                }
                return '📱 手机';
            }
            
            // 平板检测
            if (/Tablet|iPad|Kindle|PlayBook/i.test(ua)) {
                if (/iPad/i.test(ua)) return '📱 iPad';
                return '📱 平板';
            }
            
            // PC浏览器
            if (/Windows/i.test(ua)) {
                if (/Edge/i.test(ua)) return '🖥️ Win-Edge';
                if (/Chrome/i.test(ua)) return '🖥️ Win-Chrome';
                if (/Firefox/i.test(ua)) return '🖥️ Win-Firefox';
                if (/Safari/i.test(ua)) return '🖥️ Win-Safari';
                return '🖥️ Windows';
            }
            
            if (/Macintosh|Mac OS X/i.test(ua)) {
                if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) return '🖥️ Mac-Safari';
                if (/Chrome/i.test(ua)) return '🖥️ Mac-Chrome';
                return '🖥️ Mac';
            }
            
            if (/Linux/i.test(ua)) {
                if (/Chrome/i.test(ua)) return '🖥️ Linux-Chrome';
                return '🖥️ Linux';
            }
            
            return '🔍 未知';
        }

        // 格式化字节数
        function formatBytes(bytes) {
            if (!bytes || bytes === '-') return '-';
            bytes = parseFloat(bytes);
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // 格式化响应时间
        function formatTime(seconds) {
            if (!seconds || seconds === '-') return '-';
            seconds = parseFloat(seconds);
            if (seconds < 0.001) return (seconds * 1000 * 1000).toFixed(0) + ' μs';
            if (seconds < 1) return (seconds * 1000).toFixed(1) + ' ms';
            return seconds.toFixed(2) + ' s';
        }

        // 获取状态码样式类
        function getBadgeClass(status) {
            status = parseInt(status);
            if (status >= 200 && status < 300) return 'status-2xx';
            if (status >= 300 && status < 400) return 'status-3xx';
            if (status >= 400 && status < 500) return 'status-4xx';
            return 'status-5xx';
        }
        
        // 实时日志监听
        function connectRealtimeLogs() {
            const url = getUrlWithIP('/api/realtime');
            const eventSource = new EventSource(url);
            const container = document.getElementById('realtime-logs');
            
            eventSource.onmessage = function(event) {
                // 移除"连接中..."提示
                const loading = container.querySelector('.text-gray-500.text-center');
                if (loading) loading.remove();
                
                const logs = JSON.parse(event.data);
                logs.forEach(log => {
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    entry.innerHTML = `
                        <div class="flex items-center justify-between">
                            <span class="text-blue-400">${log.time_local}</span>
                            <span class="status-badge ${getBadgeClass(log.status)}">${log.status}</span>
                        </div>
                        <div class="text-gray-300">${log.request_method} ${log.request_uri}</div>
                        <div class="text-gray-500 text-xs">IP: ${log.real_ip || '-'}</div>
                    `;
                    container.prepend(entry);
                    
                    // 保持只显示最近5条
                    while (container.children.length > 5) {
                        container.removeChild(container.lastChild);
                    }
                });
            };
            
            eventSource.onerror = function() {
                eventSource.close();
                setTimeout(connectRealtimeLogs, 5000);
            };
        }
        
        // 更新显示时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('update-time').textContent = timeStr;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            fetchStatistics();
            connectRealtimeLogs();
            setInterval(fetchStatistics, 10000);
            setInterval(updateTime, 1000);
        });
    </script>
    <script src="/ip-widget.js"></script>
</body>
</html>
