<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库 - 随机题目</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
            min-height: 100vh; color: #fff;
        }
        .container { max-width: 860px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 36px; }
        .header h1 { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
        .header p { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 6px; }

        /* 随机卡片 */
        .random-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 32px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            min-height: 300px;
        }
        .random-card .meta { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .random-card .category-badge {
            font-size: 13px; padding: 4px 14px; border-radius: 12px;
            background: rgba(102,126,234,0.3); color: #a5b4fc; font-weight: 500;
        }
        .random-card .question-number {
            font-size: 13px; color: rgba(255,255,255,0.4);
            font-family: 'SF Mono', monospace;
        }
        .random-card .title {
            font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 20px;
            color: #e8e8f0;
        }
        .random-card .content {
            font-size: 15px; line-height: 1.8; color: rgba(255,255,255,0.85);
        }
        .random-card .content pre {
            background: rgba(0,0,0,0.3); border-radius: 10px; padding: 16px;
            overflow-x: auto; font-size: 13px; line-height: 1.5; margin: 12px 0;
            color: #e8e8f0; border: 1px solid rgba(255,255,255,0.08);
        }
        .random-card .content code {
            background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 4px;
            font-size: 13px;
        }
        .random-card .content h1, .random-card .content h2, .random-card .content h3 {
            color: #e8e8f0; margin-top: 24px; margin-bottom: 12px;
        }
        .random-card .content h1 { font-size: 22px; }
        .random-card .content h2 { font-size: 19px; }
        .random-card .content h3 { font-size: 16px; }
        .random-card .content table {
            border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 14px;
        }
        .random-card .content th, .random-card .content td {
            border: 1px solid rgba(255,255,255,0.15); padding: 8px 12px; text-align: left;
        }
        .random-card .content th { background: rgba(255,255,255,0.08); font-weight: 600; }
        .random-card .content hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 16px 0; }
        .random-card .content blockquote {
            border-left: 4px solid #667eea; padding: 10px 16px; margin: 12px 0;
            background: rgba(102,126,234,0.1); border-radius: 0 8px 8px 0;
            color: rgba(255,255,255,0.8);
        }

        .random-card .loading {
            text-align: center; padding: 60px 20px;
        }
        .random-card .loading .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 按钮组 */
        .actions { display: flex; gap: 12px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
        .btn {
            padding: 14px 32px; border-radius: 14px; font-size: 16px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s ease; display: flex;
            align-items: center; gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4); color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-secondary {
            background: rgba(255,255,255,0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        .empty-state {
            text-align: center; padding: 60px 20px;
        }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
        .empty-state p { color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>随机一题</h1>
            <p>每次刷新都带来新的知识</p>
        </div>

        <div class="random-card" id="randomCard">
            <div class="loading">
                <div class="spinner"></div>
                <div>加载中...</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="nextBtn">🎲 下一题</button>
            <a href="/tools/knowledge/" class="btn btn-secondary">📋 返回列表</a>
        </div>
    </div>

    <script>
        const BASE_URL = '/tools/knowledge';

        function mdToHtml(text) {
            if (!text) return '';
            let html = escapeHtml(text);
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/\|(.+)\|/g, function(match) {
                if (match.includes('---')) return '';
                const cells = match.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
                return `<tr>${cells}</tr>`;
            });
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            return `<p>${html}</p>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadRandom() {
            const card = document.getElementById('randomCard');
            const btn = document.getElementById('nextBtn');
            btn.disabled = true;

            card.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>加载中...</div>
                </div>
            `;

            try {
                const res = await fetch(`${BASE_URL}/api/random`);
                const data = await res.json();

                if (data.error) {
                    card.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>${escapeHtml(data.error)}</p>
                        </div>
                    `;
                    btn.disabled = false;
                    return;
                }

                card.innerHTML = `
                    <div class="meta">
                        <span class="category-badge">${escapeHtml(data.category)}</span>
                        <span class="question-number">#${data.id}</span>
                    </div>
                    <div class="title">${escapeHtml(data.title)}</div>
                    <div class="content">${mdToHtml(data.content)}</div>
                `;
                btn.disabled = false;

            } catch (e) {
                card.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>加载失败，请重试</p>
                    </div>
                `;
                btn.disabled = false;
            }
        }

        document.getElementById('nextBtn').addEventListener('click', loadRandom);
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space' || e.key === 'n') {
                e.preventDefault();
                loadRandom();
            }
        });

        loadRandom();
    </script>
</body>
</html>
